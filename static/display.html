<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kai & Bella 婚禮問答</title>
<!-- PWA -->
<link rel="manifest" href="/quiz/manifest.json" />
<meta name="theme-color" content="#C9A96E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="婚禮問答" />
<link rel="apple-touch-icon" href="/quiz/static/icon-192.png" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #080810;
    --bg-card:    #12121E;
    --bg-glass:   rgba(255,255,255,0.04);
    --border:     rgba(255,255,255,0.08);
    --gold:       #C9A96E;
    --gold-light: #F0D080;
    --gold-glow:  rgba(201,169,110,0.25);
    --text-main:  #F5F0E8;
    --text-muted: #8888A8;
    --opt-A:      #B84D6A;
    --opt-B:      #3D6DB5;
    --opt-C:      #B08030;
    --opt-D:      #4A9460;
    --correct:    #4ADE80;
    --wrong:      #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    user-select: none;
    position: relative;
  }

  /* ── 背景裝飾光暈 ── */
  body::before {
    content: '';
    position: fixed;
    top: -20vh; left: -10vw;
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(201,169,110,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20vh; right: -10vw;
    width: 50vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(100,60,180,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── 畫面切換 ── */
  .screen { display: none; width: 100%; height: 100vh; position: relative; z-index: 1; }
  .screen.active {
    display: flex; flex-direction: column;
    animation: pageIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: scale(0.96) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ══════════════════════════════
     LOBBY
  ══════════════════════════════ */
  #screen-lobby {
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  .lobby-title {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: 3.8vw;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    filter: drop-shadow(0 0 20px var(--gold-glow));
  }
  .lobby-subtitle {
    font-size: 1.6vw;
    color: var(--text-muted);
    text-align: center;
    font-weight: 600;
  }
  .join-instruction {
    background: var(--bg-glass);
    border: 1px solid var(--gold);
    border-radius: 24px;
    padding: 24px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.06);
    display: inline-flex;
  }
  .join-qr-wrap {
    flex-shrink: 0;
  }
  .join-qr-wrap img {
    width: 13vw;
    height: 13vw;
    min-width: 120px;
    min-height: 120px;
    border-radius: 12px;
    border: 3px solid var(--gold);
    padding: 6px;
    background: #fff;
    display: block;
    box-shadow: 0 0 20px var(--gold-glow);
  }
  #lobby-player-count {
    font-size: 1.8vw;
    color: var(--text-muted);
    font-weight: 600;
  }
  #lobby-player-count span {
    font-family: 'Playfair Display', serif;
    font-size: 3.8vw;
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 20px var(--gold-glow);
  }

  /* ── 獎品預告 ── */
  .prize-banner {
    background: var(--bg-glass);
    border: 1px solid rgba(201,169,110,0.35);
    border-radius: 20px;
    padding: 18px 36px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 32px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-width: 38vw;
  }
  .prize-banner-title {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: 1.3vw;
    color: var(--gold);
    letter-spacing: 3px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .prize-list {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
  }
  .prize-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 20px;
    border-radius: 14px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    min-width: 10vw;
  }
  .prize-item:nth-child(1) { border-color: var(--gold); background: rgba(201,169,110,0.08); }
  .prize-item:nth-child(2) { border-color: rgba(200,200,220,0.3); }
  .prize-item:nth-child(3) { border-color: rgba(200,150,80,0.3); }
  .prize-medal { font-size: 2vw; }
  .prize-name {
    font-size: 1.05vw;
    font-weight: 700;
    color: var(--text-main);
    text-align: center;
    line-height: 1.4;
  }
  .prize-item:nth-child(1) .prize-name { color: var(--gold-light); }

  /* ══════════════════════════════
     CATEGORY INTRO（類別過場）
  ══════════════════════════════ */
  #screen-category-intro {
    background: var(--bg-deep);
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  #screen-category-intro::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 90vw; height: 90vh;
    background: radial-gradient(ellipse, rgba(201,169,110,0.18) 0%, transparent 65%);
    pointer-events: none;
  }
  .cat-intro-tag {
    font-family: 'Playfair Display', serif;
    font-size: 1.6vw;
    color: var(--gold);
    letter-spacing: 8px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 28px;
    opacity: 0;
    animation: catFadeIn 0.6s ease 0.2s both;
  }
  .cat-intro-title {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: 9vw;
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 1.2;
    text-align: center;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 40px var(--gold-glow));
    opacity: 0;
    animation: catTitleIn 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.4s both;
  }
  .cat-intro-divider {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px 0 0;
    opacity: 0;
    animation: catFadeIn 0.6s ease 1.0s both;
  }
  @keyframes catFadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes catTitleIn {
    from { opacity: 0; transform: scale(0.85); letter-spacing: 24px; }
    to   { opacity: 1; transform: scale(1); letter-spacing: 8px; }
  }

  /* ══════════════════════════════
     QUESTION
  ══════════════════════════════ */
  #screen-question { background: var(--bg-deep); overflow: hidden; }

  .question-progress-bar {
    height: 4px;
    background: var(--border);
    width: 100%;
    flex-shrink: 0;
  }
  .question-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.5s ease;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 8px var(--gold-glow);
  }

  .question-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 40px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .q-progress { font-size: 2vw; color: var(--text-muted); font-weight: 700; }
  .q-progress strong { color: var(--gold-light); }

  /* 倒數圓圈 */
  .timer-wrapper { position: relative; width: 80px; height: 80px; }
  .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
  .timer-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 8; }
  .timer-bar   { fill: none; stroke: var(--gold); stroke-width: 8;
                 stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
  .timer-text  { position: absolute; inset: 0; display: flex; align-items: center;
                 justify-content: center; font-size: 1.8vw; font-weight: 900;
                 font-family: 'Playfair Display', serif; }

  .q-answered { font-size: 1.8vw; color: var(--text-muted); font-weight: 600; }

  .question-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 60px;
    gap: 16px;
  }
  .question-card {
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 48px;
    width: 100%;
    max-width: 90%;
    text-align: center;
    backdrop-filter: blur(8px);
  }
  .question-image {
    max-height: 26vh;
    max-width: 80%;
    border-radius: 16px;
    object-fit: contain;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    margin-bottom: 12px;
  }
  .question-text {
    font-size: 2.6vw;
    font-weight: 700;
    text-align: center;
    line-height: 1.4;
    color: var(--text-main);
  }

  /* 選項 */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 0 40px 20px;
    width: 100%;
    flex-shrink: 0;
  }
  .option-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 1.9vw;
    font-weight: 700;
    transition: transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .option-box::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    border-radius: 14px 0 0 14px;
  }
  .option-box.A::before { background: var(--opt-A); box-shadow: 0 0 12px rgba(184,77,106,0.5); }
  .option-box.B::before { background: var(--opt-B); box-shadow: 0 0 12px rgba(61,109,181,0.5); }
  .option-box.C::before { background: var(--opt-C); box-shadow: 0 0 12px rgba(176,128,48,0.5); }
  .option-box.D::before { background: var(--opt-D); box-shadow: 0 0 12px rgba(74,148,96,0.5); }

  .option-icon {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2vw; font-weight: 900; flex-shrink: 0; margin-left: 4px;
  }
  .option-box.A .option-icon { background: rgba(184,77,106,0.2); color: var(--opt-A); }
  .option-box.B .option-icon { background: rgba(61,109,181,0.2); color: var(--opt-B); }
  .option-box.C .option-icon { background: rgba(176,128,48,0.2); color: var(--opt-C); }
  .option-box.D .option-icon { background: rgba(74,148,96,0.2); color: var(--opt-D); }

  .option-image { width: 100%; max-height: 80px; object-fit: contain; border-radius: 8px; }

  /* ── 圖片選項模式：四張圖永遠貼滿視窗，不溢出 ── */
  #screen-question.image-mode {
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    /* display: flex 由 .screen.active 提供;不在 ID+class 層直接寫,避免特異性蓋住 .screen 的 display:none */
  }
  /* Header 壓到最小 */
  #screen-question.image-mode .question-progress-bar { height: 3px; }
  #screen-question.image-mode .question-header {
    padding: 4px 16px;
    min-height: 0;
    flex-shrink: 0;
  }
  #screen-question.image-mode .timer-wrapper,
  #screen-question.image-mode .timer-svg {
    width: 48px; height: 48px;
  }
  #screen-question.image-mode .timer-text  { font-size: clamp(12px, 1.4vw, 22px); }
  #screen-question.image-mode .q-progress  { font-size: clamp(11px, 1vw, 18px); }
  #screen-question.image-mode .q-answered  { font-size: clamp(10px, 0.9vw, 16px); }

  /* 題目文字：緊縮 */
  #screen-question.image-mode .question-body {
    flex: 0 0 auto;
    padding: 3px 12px;
    min-height: 0;
  }
  #screen-question.image-mode .question-card {
    padding: 8px 24px;
    border-radius: 10px;
    max-width: 100%;
  }
  #screen-question.image-mode .question-text {
    font-size: clamp(14px, 2vw, 32px);
  }

  /* 選項 grid：flex:1 + min-height:0 確保不超出 */
  #screen-question.image-mode .options-grid {
    flex: 1 1 0%;
    min-height: 0;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    padding: 3px 4px 4px;
    gap: 4px;
    width: 100%;
    flex-shrink: 1;
  }

  /* 每個 box 必須不超出格子 */
  #screen-question.image-mode .option-box {
    padding: 0;
    overflow: hidden;
    min-height: 0;
    max-height: 100%;
    align-items: stretch;
    border-radius: 8px;
    position: relative;
    height: auto;
  }
  #screen-question.image-mode .option-box::before {
    width: 6px; z-index: 2;
    border-radius: 8px 0 0 8px;
  }

  /* A/B/C/D 角標 */
  #screen-question.image-mode .option-icon {
    position: absolute;
    top: 8px; left: 10px;
    z-index: 3;
    width: clamp(28px, 2.8vw, 44px);
    height: clamp(28px, 2.8vw, 44px);
    font-size: clamp(11px, 1.2vw, 20px);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.60);
    backdrop-filter: blur(4px);
  }

  /* 圖片：完全填滿 box，不溢出 */
  #screen-question.image-mode .option-image {
    display: block;
    width: 100%;
    height: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 0;
    background: #0a0a18;
  }

  /* ══════════════════════════════
     REVEAL
  ══════════════════════════════ */
  #screen-reveal {
    background: var(--bg-deep);
    overflow: hidden;
    /* display: flex 由 .screen.active 提供;不在 ID 層直接寫,避免特異性蓋住 .screen 的 display:none */
  }
  /* 頂部標題列 */
  .reveal-header {
    display: flex; align-items: center; gap: 20px;
    padding: 14px 48px;
    background: rgba(74,222,128,0.06);
    border-bottom: 1px solid rgba(74,222,128,0.2);
    flex-shrink: 0;
  }
  .reveal-correct-label {
    font-size: 2vw; color: var(--correct); font-weight: 700;
    letter-spacing: 2px; flex-shrink: 0;
  }
  .reveal-correct-text {
    font-family: 'Playfair Display', serif;
    font-size: 2.4vw; font-weight: 900;
    color: var(--correct);
    text-shadow: 0 0 24px rgba(74,222,128,0.35);
  }
  /* 中央大圖 / 大文字區 */
  .reveal-main {
    flex: 1 1 0%; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 16px 48px;
    overflow: hidden;
  }
  .reveal-main img, .reveal-main video {
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: 20px;
    animation: revealPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .reveal-main-text {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: clamp(2rem, 6vw, 8rem);
    font-weight: 900; color: var(--correct);
    text-align: center; line-height: 1.3;
    text-shadow: 0 0 40px rgba(74,222,128,0.4);
    animation: revealPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes revealPop {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  /* 底部答題分布條 */
  .reveal-dist-strip {
    display: flex; gap: 8px;
    padding: 10px 48px 14px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 90px;
  }
  .dist-row {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .dist-label {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.6vw; flex-shrink: 0;
    background: var(--bg-card);
  }
  .dist-label.A { color: var(--opt-A); border: 2px solid var(--opt-A); }
  .dist-label.B { color: var(--opt-B); border: 2px solid var(--opt-B); }
  .dist-label.C { color: var(--opt-C); border: 2px solid var(--opt-C); }
  .dist-label.D { color: var(--opt-D); border: 2px solid var(--opt-D); }
  .dist-label.correct-mark { box-shadow: 0 0 0 3px var(--correct), 0 0 12px rgba(74,222,128,0.4); }
  .dist-bar-wrap {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 6px; height: 32px; overflow: hidden;
  }
  .dist-bar {
    height: 100%; border-radius: 6px; transition: width 1s ease;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px; font-weight: 700; font-size: 1.4vw; min-width: 40px; opacity: 0.85;
  }
  .dist-bar.A { background: var(--opt-A); }
  .dist-bar.B { background: var(--opt-B); }
  .dist-bar.C { background: var(--opt-C); }
  .dist-bar.D { background: var(--opt-D); }
  .dist-count { font-size: 1.7vw; font-weight: 800; color: var(--text-muted); }

  /* ══════════════════════════════
     FASTEST BREAKDOWN（最快榜 / 選項分布）
  ══════════════════════════════ */
  #screen-fastest {
    background: var(--bg-deep);
    overflow: hidden;
    padding: 0;
    /* display: flex 由 .screen.active 提供;不在 ID 層直接寫,避免特異性蓋住 .screen 的 display:none */
  }
  .fastest-hero {
    flex: 0 0 auto;
    padding: 28px 48px 18px;
    text-align: center;
    background: linear-gradient(180deg, rgba(201,169,110,0.14) 0%, transparent 100%);
    border-bottom: 1px solid rgba(201,169,110,0.18);
  }
  .fastest-hero-label {
    font-family: 'Playfair Display', serif;
    font-size: 1.8vw;
    color: var(--gold);
    letter-spacing: 6px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .fastest-hero-name {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: 5.2vw;
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 24px var(--gold-glow));
    animation: heroIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .fastest-hero-time {
    font-family: 'Playfair Display', serif;
    font-size: 2.2vw;
    font-weight: 700;
    color: var(--correct);
    margin-top: 6px;
    letter-spacing: 2px;
    animation: heroIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
  }
  .fastest-hero-empty {
    font-size: 1.8vw;
    color: var(--text-muted);
    font-style: italic;
    padding: 30px 0;
    animation: heroIn 0.6s ease both;
  }
  @keyframes heroIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .fastest-options {
    flex: 1 1 0%;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 18px 48px 24px;
    overflow: hidden;
  }
  .fopt-row {
    flex: 1 1 0%;
    min-height: 0;
    display: grid;
    grid-template-columns: 60px auto 1fr auto;
    align-items: center;
    gap: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 18px;

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/quiz/ws`;
const CIRCUMFERENCE = 2 * Math.PI * 32; // ≈ 201

let ws, currentTimeLimit = 20, timerInterval = null;
let questionStartTime = null;
let currentOptionType = 'text', currentOptions = [];

// ── 音效 (Web Audio API) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function ensureAudio() {
  if (!actx) actx = new AudioCtx();
}
function playTone(freq, dur, type='sine', vol=0.3) {
  ensureAudio();
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.connect(gain); gain.connect(actx.destination);
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, actx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  osc.start(); osc.stop(actx.currentTime + dur);
}
function sfxTick()    { playTone(440, 0.08, 'square', 0.15); }
function sfxCorrect() {
  [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => playTone(f, 0.18, 'sine', 0.4), i*90));
}
function sfxWrong()   { playTone(180, 0.4, 'sawtooth', 0.3); }
function sfxReveal()  {
  [200, 300, 400, 500, 600].forEach((f,i) => setTimeout(() => playTone(f, 0.12, 'sine', 0.25), i*60));
}
function sfxLeaderboard() {
  [523,523,659,523,784,740].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.35), i*120));
}
function sfxCountdownUrgent() { playTone(880, 0.12, 'square', 0.25); }

// ── 彩帶效果 ──
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#C9A96E','#F0D080','#4ADE80','#B84D6A','#3D6DB5','#fff','#f8c8d4'];
  for (let i = 0; i < 150; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 12 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 2,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.2,
      life: 1,
    });
  }
  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.life -= 0.007;
      if (p.y < canvas.height && p.life > 0) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  if (frame) cancelAnimationFrame(frame);
  draw();
}

// ── 畫面切換 ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ── 倒數計時 ──
function startTimer(timeLimit, remaining) {
  clearInterval(timerInterval);
  const bar = document.getElementById('timer-bar');
  const txt = document.getElementById('timer-text');
  let t = remaining !== undefined ? remaining : timeLimit;
  const total = timeLimit;

  function update() {
    const pct = t / total;
    bar.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
    bar.style.stroke = t > total * 0.4 ? '#50fa7b' : t > total * 0.2 ? '#ffd700' : '#ff5555';
    txt.textContent = Math.ceil(t);
    txt.style.color = t <= 5 ? '#ff5555' : '#fff';
    if (t <= 5 && t > 0) sfxTick();
    if (t <= 0) {
      clearInterval(timerInterval);
      bar.style.strokeDashoffset = CIRCUMFERENCE;
      txt.textContent = '0';
    }
    t = Math.max(0, t - 1);
  }
  update();
  timerInterval = setInterval(update, 1000);
}

// ── 建立選項 ──
const OPTION_LABELS = ['A','B','C','D'];
const OPTION_COLORS = ['A','B','C','D'];

function buildOptions(options, optionType, disabled=false) {
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  document.getElementById('screen-question').classList.toggle('image-mode', optionType === 'image');
  options.forEach((opt, i) => {
    const box = document.createElement('div');
    box.className = `option-box ${OPTION_LABELS[i]}`;
    box.id = `opt-${i}`;
    const icon = document.createElement('div');
    icon.className = 'option-icon';
    icon.textContent = OPTION_LABELS[i];
    box.appendChild(icon);
    if (optionType === 'image') {
      const img = document.createElement('img');
      img.src = opt; img.className = 'option-image'; img.alt = OPTION_LABELS[i];
      box.appendChild(img);
    } else {
      const span = document.createElement('span');
      span.textContent = opt;
      box.appendChild(span);
    }
    grid.appendChild(box);
  });
}

// ── 答案分布（橫條版，底部 strip） ──
function buildDistribution(distribution, correct) {
  const container = document.getElementById('distribution');
  container.innerHTML = '';
  const max = Math.max(...distribution, 1);
  distribution.forEach((count, i) => {
    const row = document.createElement('div');
    row.className = 'dist-row';
    const label = document.createElement('div');
    label.className = `dist-label ${OPTION_LABELS[i]}${i===correct ? ' correct-mark' : ''}`;
    label.textContent = OPTION_LABELS[i];
    const barWrap = document.createElement('div');
    barWrap.className = 'dist-bar-wrap';
    const bar = document.createElement('div');
    bar.className = `dist-bar ${OPTION_LABELS[i]}`;
    bar.style.width = '0%';
    bar.textContent = count > 0 ? count + '人' : '';
    barWrap.appendChild(bar);
    const cnt = document.createElement('div');
    cnt.className = 'dist-count';
    cnt.textContent = count;
    row.appendChild(label); row.appendChild(barWrap); row.appendChild(cnt);
    container.appendChild(row);
    setTimeout(() => { bar.style.width = (count / max * 100) + '%'; }, 100 + i * 80);
  });
}

// ── 揭曉主畫面（大圖/大文字）──
function buildRevealMain(data) {
  const main = document.getElementById('reveal-main');
  main.innerHTML = '';

  // 優先順序：reveal_media > 圖片選項答案 > 文字大字
  if (data.reveal_media) {
    if (data.reveal_media.type === 'image') {
      const img = document.createElement('img');
      img.src = data.reveal_media.url; img.alt = '揭曉';
      main.appendChild(img);
    } else if (data.reveal_media.type === 'video') {
      const video = document.createElement('video');
      video.src = data.reveal_media.url;
      video.autoplay = true; video.controls = false; video.loop = false; video.muted = false;
      main.appendChild(video);
      video.play().catch(() => {});
    }
  } else if (data.option_type === 'image' && currentOptions[data.correct]) {
    const img = document.createElement('img');
    img.src = currentOptions[data.correct]; img.alt = '正確答案';
    main.appendChild(img);
  } else {
    // 文字大字
    const div = document.createElement('div');
    div.className = 'reveal-main-text';
    div.textContent = `${OPTION_LABELS[data.correct]}. ${data.correct_text}`;
    main.appendChild(div);
  }
}

// ── 最快榜 / 選項分布 ──
function buildFastestBreakdown(data) {
  // Hero 區:最快答對者大字
  const heroBody = document.getElementById('fastest-hero-body');
  if (data.fastest_correct) {
    heroBody.innerHTML = `
      <div class="fastest-hero-name">${escapeHtml(data.fastest_correct.nickname)}</div>
      <div class="fastest-hero-time">${data.fastest_correct.time.toFixed(2)} 秒</div>
    `;
  } else {
    heroBody.innerHTML = `<div class="fastest-hero-empty">這題大家太謙虛了 😅 沒人答對</div>`;
  }

  // 選項條
  const container = document.getElementById('fastest-options');
  container.innerHTML = '';
  const maxCount = Math.max(...data.options.map(o => o.count), 1);

  const isImageMode = data.option_type === 'image';
  data.options.forEach(opt => {
    const isCorrect = opt.index === data.correct;
    const row = document.createElement('div');
    row.className = `fopt-row ${opt.label}${isCorrect ? ' correct' : ''}`;

    const fastestHtml = opt.fastest
      ? `<div class="fopt-fastest">最快：<strong>${escapeHtml(opt.fastest.nickname)}</strong> · ${opt.fastest.time.toFixed(2)} 秒</div>`
      : `<div class="fopt-fastest-none">無人選此選項</div>`;

    // 選項預覽:圖片題顯示縮圖,文字題顯示文字
    const previewHtml = isImageMode
      ? `<img class="fopt-preview-img" src="${escapeHtml(opt.option_text || '')}" alt="${opt.label}">`
      : `<div class="fopt-preview">${escapeHtml(opt.option_text || '')}</div>`;

    row.innerHTML = `
      <div class="fopt-label">${opt.label}</div>
      ${previewHtml}
      <div class="fopt-body">
        <div class="fopt-bar-row">
          <div class="fopt-bar-wrap"><div class="fopt-bar" style="width:0%"></div></div>
        </div>
        ${fastestHtml}
      </div>
      <div class="fopt-count">${opt.count} <span style="font-size:0.55em;color:var(--text-muted);font-weight:600">人</span></div>
    `;
    container.appendChild(row);

    // 動畫:條寬延遲展開
    requestAnimationFrame(() => {
      setTimeout(() => {
        const bar = row.querySelector('.fopt-bar');
        bar.style.width = (opt.count / maxCount * 100) + '%';
      }, 200);
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 題目文字渲染:先全 escape,再白名單還原 <sup>/<sub>/<br>(用於數學次方)
function renderQuestionText(text) {
  return escapeHtml(text)
    .replace(/&lt;sup&gt;(.*?)&lt;\/sup&gt;/g, '<sup>$1</sup>')
    .replace(/&lt;sub&gt;(.*?)&lt;\/sub&gt;/g, '<sub>$1</sub>')
    .replace(/&lt;br\s*\/?&gt;/g, '<br>')
    .replace(/\n/g, '<br>');
}

// ── 最終獎品排行榜 (Top 5,Top 3 帶獎品) ──
const FINAL_PRIZES = [
  { medal: '🥇', name: '夏慕尼兩人餐券', cls: 'gold' },
  { medal: '🥈', name: '星巴克兌換券 ×10', cls: 'silver' },
  { medal: '🥉', name: '威秀電影票雙人券', cls: 'bronze' },
];

function buildFinalPrizeBoard(list) {
  const container = document.getElementById('finish-prize-list');
  container.innerHTML = '';
  const top5 = (list || []).slice(0, 5);
  top5.forEach((item, i) => {
    const prize = FINAL_PRIZES[i];  // 1-3 名才有獎品
    const row = document.createElement('div');
    row.className = `fp-row ${prize ? prize.cls : 'normal'}`;
    const medal = prize ? prize.medal : (i + 1);
    const prizeHtml = prize
      ? `<div class="fp-prize">獲得：<strong>${escapeHtml(prize.name)}</strong></div>`
      : '';
    row.innerHTML = `
      <div class="fp-medal">${medal}</div>
      <div class="fp-body">
        <div class="fp-name">${escapeHtml(item.nickname)}</div>
        ${prizeHtml}
      </div>
      <div class="fp-score">${item.score.toLocaleString()} 分</div>
    `;
    container.appendChild(row);
  });
}

// ── 排行榜 ──
function buildLeaderboard(list, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  list.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row';
    const rankEl = document.createElement('div');
    rankEl.className = `lb-rank ${i===0?'top1':i===1?'top2':i===2?'top3':''}`;
    if (i >= 3) rankEl.textContent = item.rank;
    const nameEl = document.createElement('div');
    nameEl.className = 'lb-name';
    nameEl.textContent = item.nickname;
    const scoreEl = document.createElement('div');
    scoreEl.className = 'lb-score';
    scoreEl.textContent = item.score.toLocaleString() + ' 分';
    row.appendChild(rankEl); row.appendChild(nameEl); row.appendChild(scoreEl);
    container.appendChild(row);
  });
}

// ── WebSocket 訊息處理 ──
function handleMessage(data) {
  switch(data.type) {

    case 'state_sync':
      document.getElementById('player-count').textContent = data.player_count;
      const playUrl = `${location.protocol}//${location.hostname}/quiz/play`;
      document.getElementById('join-url').textContent = `${location.hostname}/quiz/play`;
      document.getElementById('join-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=6&data=${encodeURIComponent(playUrl)}`;
      // 若已不在 LOBBY,讓後續到達的 category_intro/question_start 等訊息切換畫面
      if (data.phase === 'LOBBY' || !data.phase) showScreen('lobby');
      break;

    case 'category_intro':
      clearInterval(timerInterval);
      document.getElementById('cat-intro-tag').textContent =
        `CHAPTER ${data.category_index} / ${data.category_total}`;
      document.getElementById('cat-intro-title').textContent = data.category;
      // 強制重啟動畫:移除 active 後 reflow 再加回
      const catScreen = document.getElementById('screen-category-intro');
      catScreen.classList.remove('active');
      void catScreen.offsetWidth;
      showScreen('category-intro');
      sfxReveal();
      break;

    case 'player_count':
      document.getElementById('player-count').textContent = data.count;
      break;

    case 'question_start':
      clearInterval(timerInterval);
      showScreen('question');
      document.getElementById('q-current').textContent = data.index + 1;
      document.getElementById('q-total').textContent = data.total;
      document.getElementById('q-answered').textContent = '0 人已答';
      currentTimeLimit = data.time_limit;
      questionStartTime = Date.now();

      const imgEl = document.getElementById('q-image');
      if (data.image) {
        imgEl.src = data.image; imgEl.style.display = 'block';
      } else { imgEl.style.display = 'none'; }

      // 題目用 innerHTML 渲染,讓 questions.json 內的 <sup> 等數學標籤正確顯示
      document.getElementById('q-text').innerHTML = renderQuestionText(data.text);
      currentOptionType = data.option_type || 'text';
      currentOptions = data.options || [];
      buildOptions(data.options, currentOptionType);
      startTimer(data.time_limit, data.remaining);
      break;

    case 'answer_progress':
      document.getElementById('q-answered').textContent = `${data.answered} / ${data.total} 人已答`;
      break;

    case 'answer_reveal':
      clearInterval(timerInterval);
      // 重連時 currentOptions / currentOptionType 可能為空，從 payload 補回
      if (data.options)     currentOptions    = data.options;
      if (data.option_type) currentOptionType = data.option_type;
      sfxReveal();
      showScreen('reveal');
      launchConfetti();
      // 頂部標題：文字題才顯示文字，圖片題只顯示 ABCD 標籤
      const revealEl = document.getElementById('reveal-answer-text');
      if (currentOptionType === 'image') {
        revealEl.textContent = OPTION_LABELS[data.correct];
      } else {
        revealEl.textContent = `${OPTION_LABELS[data.correct]}. ${data.correct_text}`;
      }
      buildRevealMain(data);
      buildDistribution(data.distribution, data.correct);
      break;

    case 'option_breakdown':
      sfxReveal();
      buildFastestBreakdown(data);
      showScreen('fastest');
      break;

    case 'leaderboard':
      sfxLeaderboard();
      buildLeaderboard(data.leaderboard, 'lb-list');
      document.getElementById('lb-title') &&
        (document.getElementById('lb-title').textContent = data.is_final ? '🏆 最終排行榜' : '🏆 目前排行榜');
      showScreen('leaderboard');
      break;

    case 'game_finish':
      sfxLeaderboard();
      launchConfetti();
      buildFinalPrizeBoard(data.leaderboard);
      showScreen('finish');
      break;

    case 'game_reset':
      document.getElementById('player-count').textContent = '0';
      showScreen('lobby');
      break;
  }
}

// ── 連線 ──
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'display' }));
    document.getElementById('join-url').textContent = `${location.hostname}/quiz/play`;
  };
  ws.onmessage = e => handleMessage(JSON.parse(e.data));
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror = () => ws.close();
}

document.addEventListener('click', ensureAudio);
connect();
