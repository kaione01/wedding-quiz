<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>婚禮問答 — 加入遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #080810;
    --bg-card:    #12121E;
    --bg-glass:   rgba(255,255,255,0.04);
    --border:     rgba(255,255,255,0.08);
    --gold:       #C9A96E;
    --gold-light: #F0D080;
    --gold-glow:  rgba(201,169,110,0.25);
    --text-main:  #F5F0E8;
    --text-muted: #8888A8;
    --opt-A:      #B84D6A;
    --opt-B:      #3D6DB5;
    --opt-C:      #B08030;
    --opt-D:      #4A9460;
    --correct:    #4ADE80;
    --wrong:      #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* 背景光暈 */
  body::before {
    content: '';
    position: fixed;
    top: -30vh; left: -20vw;
    width: 80vw; height: 80vh;
    background: radial-gradient(ellipse, rgba(201,169,110,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── 畫面切換 ── */
  .screen { display: none; width: 100%; max-width: 480px; position: relative; z-index: 1; }
  .screen.active {
    display: flex; flex-direction: column; align-items: center;
    animation: pageIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: scale(0.96) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── JOIN ── */
  #screen-join { gap: 28px; }

  .join-ring {
    font-size: 3rem;
    filter: drop-shadow(0 0 16px var(--gold-glow));
  }

  .join-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 60%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.3;
  }
  .join-sub {
    font-size: 0.95rem;
    color: var(--text-muted);
    text-align: center;
    font-weight: 600;
  }

  /* 底線輸入框 */
  .input-field {
    width: 100%;
    padding: 14px 4px;
    font-size: 1.4rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    border: none;
    border-bottom: 2px solid var(--border);
    border-radius: 0;
    background: transparent;
    color: var(--text-main);
    text-align: center;
    outline: none;
    transition: border-color 0.25s;
  }
  .input-field:focus { border-bottom-color: var(--gold); }
  .input-field::placeholder { color: var(--text-muted); font-weight: 400; }

  /* 金色漸層按鈕 */
  .btn-join {
    width: 100%;
    padding: 18px;
    font-size: 1.15rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    color: #0a0a14;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 24px var(--gold-glow);
    letter-spacing: 0.5px;
  }
  .btn-join:active { transform: scale(0.97); }
  .btn-join:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .error-msg { color: #ff6b6b; font-size: 0.9rem; font-weight: 600; min-height: 1.2em; }

  /* ── LOBBY ── */
  #screen-lobby { gap: 28px; text-align: center; }

  .lobby-nickname {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 24px var(--gold-glow);
  }
  .lobby-wait {
    font-size: 1.05rem;
    color: var(--text-muted);
    line-height: 1.7;
    font-weight: 600;
  }
  .lobby-player-count {
    font-size: 0.95rem;
    color: var(--text-muted);
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg-glass);
    font-weight: 600;
  }

  /* 3-ring pulse in gold */
  .pulse-rings {
    position: relative;
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .pulse-rings::before,
  .pulse-rings::after,
  .pulse-rings span {
    content: '';
    position: absolute;
    border: 2px solid var(--gold);
    border-radius: 50%;
    animation: ringPulse 2s ease-out infinite;
    opacity: 0;
  }
  .pulse-rings::before { width: 20px; height: 20px; animation-delay: 0s; }
  .pulse-rings span    { width: 36px; height: 36px; animation-delay: 0.5s; display: block; position: absolute; border: 2px solid var(--gold); border-radius: 50%; }
  .pulse-rings::after  { width: 52px; height: 52px; animation-delay: 1s; }
  .pulse-core {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 8px var(--gold-glow);
    position: relative; z-index: 1;
  }
  @keyframes ringPulse {
    0%   { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* ── CATEGORY INTRO（玩家手機端）── */
  #screen-category-intro {
    gap: 16px;
    text-align: center;
    align-items: center;
  }
  .cat-intro-tag-m {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 4px;
    font-weight: 700;
    text-transform: uppercase;
    opacity: 0;
    animation: catFadeInM 0.5s ease 0.15s both;
  }
  .cat-intro-name-m {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: 2.6rem;
    font-weight: 900;
    line-height: 1.25;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 18px var(--gold-glow));
    opacity: 0;
    animation: catTitleInM 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  .cat-intro-meta-m {
    font-size: 0.95rem;
    color: var(--text-muted);
    font-weight: 600;
    margin-top: 8px;
    opacity: 0;
    animation: catFadeInM 0.5s ease 0.7s both;
  }
  .cat-intro-divider-m {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px 0 0;
    opacity: 0;
    animation: catFadeInM 0.5s ease 0.9s both;
  }
  @keyframes catFadeInM {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes catTitleInM {
    from { opacity: 0; transform: scale(0.85); letter-spacing: 16px; }
    to   { opacity: 1; transform: scale(1); letter-spacing: 3px; }
  }

  /* ── QUESTION ── */
  #screen-question { gap: 16px; }

  /* 圖片題：整頁填滿視窗，圖最大化 */
  body.image-question {
    height: 100vh;
    min-height: 0;
    overflow: hidden;
    padding: 0;
    justify-content: flex-start;
    align-items: stretch;
  }
  body.image-question #screen-question {
    height: 100vh;
    width: 100%;
    padding: 10px 12px 8px;
    gap: 8px;
    flex-direction: column;
    align-items: stretch;
  }
  body.image-question .q-header {
    flex-shrink: 0;
  }
  body.image-question .q-card {
    flex-shrink: 0;
    padding: 10px 16px;
  }
  body.image-question .options-list.image-mode {
    flex: 1 1 0%;
    min-height: 0;
    overflow: hidden;
  }
  body.image-question .options-list.image-mode .opt-btn {
    aspect-ratio: unset;
    height: 100%;
    min-height: 0;
  }
  .q-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 700;
  }
  .q-timer {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--correct);
    transition: color 0.3s;
  }
  .q-text {
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.55;
    color: var(--text-main);
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    width: 100%;
    backdrop-filter: blur(6px);
  }
  .q-image {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  /* 2×2 grid options */
  .options-list {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .opt-btn {
    padding: 16px 14px;
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    color: var(--text-main);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.12s, filter 0.2s, outline 0.15s, box-shadow 0.2s;
    text-align: left;
    background: var(--bg-card);
    position: relative;
    overflow: hidden;
  }
  /* left color strip */
  .opt-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 14px 0 0 14px;
  }
  .opt-btn.A::before { background: var(--opt-A); }
  .opt-btn.B::before { background: var(--opt-B); }
  .opt-btn.C::before { background: var(--opt-C); }
  .opt-btn.D::before { background: var(--opt-D); }

  .opt-btn:active { transform: scale(0.97); }
  .opt-btn:disabled { filter: brightness(0.35) blur(0.5px); cursor: not-allowed; }
  .opt-btn.selected {
    transform: scale(0.97);
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    box-shadow: 0 0 16px var(--gold-glow);
  }
  .opt-btn:disabled:not(.selected) { filter: brightness(0.3) blur(1px); }

  .opt-icon {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 900; flex-shrink: 0; margin-left: 4px;
  }
  .opt-btn.A .opt-icon { color: var(--opt-A); }
  .opt-btn.B .opt-icon { color: var(--opt-B); }
  .opt-btn.C .opt-icon { color: var(--opt-C); }
  .opt-btn.D .opt-icon { color: var(--opt-D); }
  .opt-img { width: 100%; max-height: 60px; object-fit: contain; border-radius: 8px; }

  /* ── 圖片選項模式（手機）── */
  .options-list.image-mode {
    gap: 8px;
  }
  .options-list.image-mode .opt-btn {
    padding: 0;
    flex-direction: column;
    align-items: stretch;
    aspect-ratio: 4 / 3;
    height: auto;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  .options-list.image-mode .opt-btn::before {
    border-radius: 14px 14px 0 0;
    width: 100%; height: 5px;
    left: 0; top: 0; bottom: auto;
  }
  .options-list.image-mode .opt-icon {
    position: absolute;
    top: 8px; left: 8px;
    z-index: 2;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
  }
  .options-list.image-mode .opt-img {
    width: 100%;
    height: 100%;
    max-height: none;
    object-fit: contain;
    border-radius: 0;
    background: #0a0a18;
  }

  /* ── SELECTED (玩家選擇後的等待畫面) ── */
  /* 強制子元素橫向填滿（覆蓋 .screen.active 的 align-items:center） */
  #screen-selected {
    gap: 0;
    padding: 0;
    align-items: stretch !important;  /* 覆蓋 .screen.active */
    max-width: 100% !important;       /* 覆蓋 .screen max-width */
  }

  /* 圖片題：全頁填滿 */
  body.selected-image {
    height: 100vh;
    min-height: 0;
    overflow: hidden;
    padding: 0;
    justify-content: flex-start;
    align-items: stretch;
  }
  body.selected-image #screen-selected {
    height: 100vh;
    width: 100%;
    max-width: none !important;
  }

  .sel-header {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 700;
    width: 100%;
    box-sizing: border-box;
  }
  .sel-media-area {
    flex: 1 1 0%;
    min-height: 0;
    position: relative;          /* for overlay */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a18;
    overflow: hidden;
    width: 100%;
    box-sizing: border-box;
  }
  /* 文字題：fixed 高度 */
  body:not(.selected-image) .sel-media-area {
    height: 220px;
    flex: none;
    border-radius: 16px;
    margin: 12px 16px;
    width: calc(100% - 32px);
    border: 1px solid var(--border);
  }
  .sel-media-area img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: selPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  /* 選擇提示 — 疊在圖片正中央 */
  .sel-info-bar {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    transform: translateY(-50%);
    z-index: 5;
    text-align: center;
    font-weight: 900;
    font-size: 1.3rem;
    color: #fff;
    letter-spacing: 1px;
    padding: 16px 20px;
    background: rgba(0,0,0,0.68);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  /* 文字題：info bar 在頂部，不遮文字 */
  body:not(.selected-image) .sel-info-bar {
    top: 0;
    transform: none;
    font-size: 1.05rem;
    padding: 10px 16px;
    background: rgba(0,0,0,0.5);
    border-radius: 16px 16px 0 0;
  }
  .sel-text-big {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--text-main);
    text-align: center;
    padding: 20px;
    line-height: 1.4;
    animation: selPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes selPop {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  .sel-wait-bar {
    flex-shrink: 0;
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 600;
    padding: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }
  .sel-wait-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: dotBlink 1.2s infinite;
  }
  .sel-wait-dot:nth-child(2) { animation-delay: 0.2s; }
  .sel-wait-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBlink {
    0%,80%,100% { opacity: 0.2; }
    40%         { opacity: 1; }
  }

  /* ── LEADERBOARD ── */
  #screen-leaderboard { gap: 16px; }
  .lb-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 900;
    color: var(--gold-light); letter-spacing: 2px;
    text-shadow: 0 0 16px var(--gold-glow);
  }
  .lb-my-rank {
    font-size: 1rem;
    color: var(--text-muted);
    text-align: center;
    font-weight: 700;
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 18px;
  }
  .lb-rows { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .lb-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-radius: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    animation: slideIn 0.35s ease both;
  }
  .lb-row:nth-child(1) { animation-delay: 0.05s; border-color: var(--gold); background: linear-gradient(90deg, rgba(201,169,110,0.2), rgba(240,208,128,0.1)); box-shadow: 0 0 16px var(--gold-glow); }
  .lb-row:nth-child(2) { animation-delay: 0.12s; border-color: rgba(200,200,220,0.25); }
  .lb-row:nth-child(3) { animation-delay: 0.19s; border-color: rgba(180,130,60,0.3); }
  .lb-row:nth-child(n+4) { animation-delay: 0.26s; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .lb-rank-num { font-size: 1.4rem; font-weight: 900; width: 36px; text-align: center; }
  .lb-name { flex: 1; font-size: 0.95rem; font-weight: 700; }
  .lb-score { font-size: 0.95rem; font-weight: 800; color: var(--gold-light); }
  .lb-row.rank-1 .lb-score { color: var(--gold-light); }

  /* ── REVEAL (answer reveal phase) ── */
  #screen-reveal {
    padding: 0;
    gap: 0;
    align-items: stretch !important;
    max-width: 100% !important;
  }
  body.reveal-active {
    height: 100vh;
    min-height: 0;
    overflow: hidden;
    padding: 0;
    justify-content: center;
    align-items: center;
  }
  body.reveal-active #screen-reveal {
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    box-sizing: border-box;
    background: #0a0a18;
    max-width: none !important;
  }
  /* 卡片：把圖 + 上下文字包在一起 */
  .reveal-card {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .reveal-top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 18px;
    background: rgba(74,222,128,0.15);
    border-bottom: 1px solid rgba(74,222,128,0.2);
  }
  .reveal-top-label {
    font-size: 0.95rem;
    font-weight: 800;
    color: var(--correct);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .reveal-top-answer {
    font-size: 1.05rem;
    font-weight: 900;
    color: #fff;
  }
  .reveal-media-area {
    width: 100%;
    height: 55vw;          /* 正方形偏高，圖片題剛好 */
    max-height: 52vh;      /* 螢幕高度上限 */
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a18;
    overflow: hidden;
  }
  .reveal-media-area img,
  .reveal-media-area video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: revealPopMobile 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes revealPopMobile {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  .reveal-text-big {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold-light);
    text-align: center;
    line-height: 1.4;
    text-shadow: 0 0 24px var(--gold-glow);
    padding: 28px 20px;
    animation: revealPopMobile 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .reveal-personal-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 14px 18px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }
  .reveal-personal-icon { font-size: 1.8rem; flex-shrink: 0; }
  .reveal-personal-info { flex: 1; }
  .reveal-personal-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 700;
  }
  .reveal-personal-pts {
    font-size: 1.6rem;
    font-weight: 900;
    line-height: 1.2;
  }
  .reveal-personal-pts.correct { color: var(--correct); }
  .reveal-personal-pts.wrong   { color: #ff6b6b; }
  .reveal-personal-total {
    font-size: 0.82rem;
    color: var(--text-muted);
    font-weight: 600;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── FINISH ── */
  #screen-finish { gap: 20px; text-align: center; }
  .finish-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem; font-weight: 900;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px var(--gold-glow));
    line-height: 1.3;
  }

  .reconnect-msg { font-size: 0.85rem; color: #ff6b6b; margin-top: 10px; font-weight: 600; }
</style>
</head>
<body>

<!-- JOIN -->
<div id="screen-join" class="screen active">
  <div class="join-ring">💍</div>
  <div class="join-title">Kai &amp; Bella<br>婚禮問答</div>
  <div class="join-sub">輸入你的暱稱加入遊戲</div>
  <input type="text" id="nickname-input" class="input-field"
         placeholder="你的暱稱" maxlength="12" autocomplete="off">
  <button id="btn-join" class="btn-join" onclick="joinGame()">加入遊戲 🎮</button>
  <div id="join-error" class="error-msg"></div>
</div>

<!-- LOBBY -->
<div id="screen-lobby" class="screen">
  <div class="pulse-rings"><span></span><div class="pulse-core"></div></div>
  <div class="lobby-nickname" id="lobby-nickname">玩家名稱</div>
  <div class="lobby-wait">
    遊戲即將開始，請稍候
  </div>
  <div class="lobby-player-count" id="lobby-count">已加入 0 位玩家</div>
</div>

<!-- CATEGORY INTRO -->
<div id="screen-category-intro" class="screen">
  <div class="cat-intro-tag-m" id="cat-intro-tag-m">CHAPTER 1 / 5</div>
  <div class="cat-intro-name-m" id="cat-intro-name-m">類別名稱</div>
  <div class="cat-intro-divider-m"></div>
  <div class="cat-intro-meta-m" id="cat-intro-meta-m">準備好了嗎？</div>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <span id="q-progress">第 1 / 10 題</span>
    <div class="q-timer" id="q-timer">20</div>
  </div>
  <img id="q-img" class="q-image" style="display:none" src="" alt="">
  <div id="q-text" class="q-text">題目載入中...</div>
  <div class="options-list" id="options-list"></div>
</div>

<!-- SELECTED (玩家選完答案後的等待畫面，計時繼續) -->
<div id="screen-selected" class="screen">
  <div class="sel-header">
    <span id="sel-progress">第 1 / 3 題</span>
    <div class="q-timer" id="sel-timer">10</div>
  </div>
  <div class="sel-media-area" id="sel-media-area">
    <!-- sel-info-bar + media 由 JS 動態注入 -->
  </div>
  <div class="sel-wait-bar">
    等待答案公佈
    <span class="sel-wait-dot"></span>
    <span class="sel-wait-dot"></span>
    <span class="sel-wait-dot"></span>
  </div>
</div>

<!-- REVEAL (answer announce phase) -->
<div id="screen-reveal" class="screen">
  <div class="reveal-card">
    <div class="reveal-top-bar">
      <span class="reveal-top-label">✅ 正確答案</span>
      <span class="reveal-top-answer" id="reveal-answer-label"></span>
    </div>
    <div class="reveal-media-area" id="reveal-media-area">
      <!-- big image / text injected by JS -->
    </div>
    <div class="reveal-personal-bar">
      <div class="reveal-personal-icon" id="reveal-p-icon">🎉</div>
      <div class="reveal-personal-info">
        <div class="reveal-personal-label" id="reveal-p-label">答對了！</div>
        <div class="reveal-personal-pts correct" id="reveal-p-pts">+850 分</div>
      </div>
      <div class="reveal-personal-total" id="reveal-p-total">累積 850 分</div>
    </div>
  </div>
</div>

<!-- LEADERBOARD -->
<div id="screen-leaderboard" class="screen">
  <div class="lb-title">🏆 排行榜</div>
  <div class="lb-my-rank" id="lb-my-rank"></div>
  <div class="lb-rows" id="lb-rows"></div>
</div>

<!-- FINISH -->
<div id="screen-finish" class="screen">
  <div class="finish-title">🏆 最終排行榜</div>
  <div class="lb-rows" id="final-lb-rows" style="width:100%"></div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/quiz/ws`;
let ws, myNickname = '', myScore = 0;
const LABELS = ['A','B','C','D'];
let currentOptions = [], currentOptionType = 'text';

// 題目文字渲染:全 escape 後白名單還原 <sup>/<sub>/<br>(防 XSS,僅給數學標籤通過)
function escapeHtmlText(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderQuestionText(text) {
  return escapeHtmlText(text)
    .replace(/&lt;sup&gt;(.*?)&lt;\/sup&gt;/g, '<sup>$1</sup>')
    .replace(/&lt;sub&gt;(.*?)&lt;\/sub&gt;/g, '<sub>$1</sub>')
    .replace(/&lt;br\s*\/?&gt;/g, '<br>')
    .replace(/\n/g, '<br>');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  // 全頁填滿 body class 切換
  document.body.classList.toggle('image-question',  id === 'question' && currentOptionType === 'image');
  document.body.classList.toggle('selected-image',  id === 'selected' && currentOptionType === 'image');
  document.body.classList.toggle('reveal-active',   id === 'reveal');
}

// ── 音效（婚禮現場手機端關閉,大螢幕音效已足夠;多支手機同響反而干擾）──
function ensureAudio() { /* no-op */ }
function sfxTap()     { /* no-op */ }
function sfxCorrect() { /* no-op */ }
function sfxWrong()   { /* no-op */ }
function sfxTick()    { /* no-op */ }

// ── 倒數（同時更新所有畫面的計時器元素）──
let timerInterval = null;
let timerExpired = false;
function startTimer(limit, remaining) {
  clearInterval(timerInterval);
  timerExpired = false;
  let t = remaining !== undefined ? remaining : limit;
  const timerIds = ['q-timer', 'sel-timer'];
  function update() {
    const display = Math.ceil(t);
    const color = t <= 5 ? '#ff5555' : t <= 10 ? '#ffd700' : '#50fa7b';
    timerIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.textContent = display; el.style.color = color; }
    });
    if (t <= 5 && t > 0) sfxTick();
    if (t <= 0) {
      clearInterval(timerInterval);
      // 時間到:禁用所有選項按鈕,避免玩家在後端 phase 已切換後送無效 answer
      timerExpired = true;
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    }
    t = Math.max(0, t - 1);
  }
  update();
  timerInterval = setInterval(update, 1000);
}

// ── 加入遊戲（含 localStorage 持久化 + 鎖屏/重整自動重連） ──
let wsReady = false;
let pendingJoin = null;
const NICK_STORAGE_KEY = 'wedding-quiz-nickname';

function saveNickname(nick) {
  try { localStorage.setItem(NICK_STORAGE_KEY, nick); } catch (e) {}
}
function loadNickname() {
  try { return localStorage.getItem(NICK_STORAGE_KEY) || ''; } catch (e) { return ''; }
}
function clearNickname() {
  try { localStorage.removeItem(NICK_STORAGE_KEY); } catch (e) {}
}

function joinGame() {
  const nickname = document.getElementById('nickname-input').value.trim();
  const errEl = document.getElementById('join-error');
  if (!nickname) { errEl.textContent = '請輸入暱稱'; return; }
  errEl.textContent = '';
  document.getElementById('btn-join').disabled = true;
  myNickname = nickname;
  saveNickname(nickname);
  if (wsReady) {
    ws.send(JSON.stringify({ type: 'player', nickname }));
  } else {
    pendingJoin = nickname;
    connectWS();
  }
}

let reconnectTimer = null;  // 防止重複排程

function connectWS() {
  // ── Guard：已在 CONNECTING 或 OPEN 就不重複建立 ──
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

  clearTimeout(reconnectTimer);
  reconnectTimer = null;

  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    wsReady = true;
    setReconnectUI(false);
    if (pendingJoin) {
      ws.send(JSON.stringify({ type: 'player', nickname: pendingJoin }));
      pendingJoin = null;
    } else if (myNickname) {
      // 重連場景（鎖屏喚醒、暫離）:自動以原 nickname 重新加入,後端會接管 score
      ws.send(JSON.stringify({ type: 'player', nickname: myNickname }));
    }
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    wsReady = false;
    setReconnectUI(true);
    if (reconnectTimer) return;   // 已有排程，不重複
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connectWS();
    }, 1000);
  };
  ws.onerror = () => ws.close();
}

// ── iOS 關鍵修復：螢幕亮回來時立刻重連 ──
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
      connectWS();
    }
  }
});

// ── 重連提示 UI ──
function setReconnectUI(show) {
  // 所有畫面的頂部顯示一條細橫幅提示
  let bar = document.getElementById('reconnect-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'reconnect-bar';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#b91c1c;color:#fff;text-align:center;font-size:0.82rem;font-weight:700;padding:6px;letter-spacing:0.5px;display:none;';
    bar.textContent = '🔄 重新連線中...';
    document.body.prepend(bar);
  }
  bar.style.display = show ? 'block' : 'none';
}

// ── 頁面載入時:若有暫存暱稱,自動填入並嘗試重新加入 ──
function tryAutoRejoin() {
  const savedNick = loadNickname();
  if (!savedNick) return;
  // 自動填入(讓使用者看到自己的暱稱),並背景送出 join
  document.getElementById('nickname-input').value = savedNick;
  myNickname = savedNick;
  document.getElementById('btn-join').disabled = true;
  pendingJoin = savedNick;
}

function sendAction(action, extra={}) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ action, ...extra }));
  }
}

// ── 訊息處理 ──
function handleMsg(data) {
  switch(data.type) {
    case 'error':
      document.getElementById('join-error').textContent = data.msg;
      document.getElementById('btn-join').disabled = false;
      break;

    case 'joined':
      myNickname = data.nickname;
      myScore = data.score || 0;  // 重連場景:後端送回累積分數
      saveNickname(data.nickname);
      document.getElementById('lobby-nickname').textContent = `👋 ${data.nickname}`;
      // 預設先回大廳;若後端隨後送 question_start/answer_reveal/leaderboard,會自動切到對應畫面
      showScreen('lobby');
      break;

    case 'player_count':
      document.getElementById('lobby-count').textContent = `已加入 ${data.count} 位玩家`;
      break;

    case 'category_intro':
      clearInterval(timerInterval);
      document.getElementById('cat-intro-tag-m').textContent =
        `CHAPTER ${data.category_index} / ${data.category_total}`;
      document.getElementById('cat-intro-name-m').textContent = data.category;
      document.getElementById('cat-intro-meta-m').textContent =
        `共 ${data.questions_in_category} 題，準備好了嗎？`;
      // 重啟動畫
      const catScreen = document.getElementById('screen-category-intro');
      catScreen.classList.remove('active');
      void catScreen.offsetWidth;
      showScreen('category-intro');
      break;

    case 'question_start':
      clearInterval(timerInterval);
      currentOptions = data.options || [];
      currentOptionType = data.option_type || 'text';
      showScreen('question');
      const progressText = `第 ${data.index+1} / ${data.total} 題`;
      document.getElementById('q-progress').textContent = progressText;
      document.getElementById('sel-progress').textContent = progressText;
      const imgEl = document.getElementById('q-img');
      if (data.image) { imgEl.src = data.image; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; }
      // 題目用 innerHTML 渲染,讓 <sup>x</sup> 數學標籤正確顯示
      document.getElementById('q-text').innerHTML = renderQuestionText(data.text);
      buildOptions(data.options, currentOptionType);
      startTimer(data.time_limit, data.remaining);
      break;

    case 'answer_received': {
      // submitAnswer 時前端已樂觀切到 selected;這裡額外處理重連場景
      // (重連時後端會主動送 answer_received 通知「你之前已答過了」)
      const opt = data.option;
      if (typeof opt === 'number' && opt >= 0) {
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        buildSelectedScreen(opt);
        showScreen('selected');
      }
      break;
    }

    case 'answer_reveal': {
      clearInterval(timerInterval);
      const isCorrect = data.personal_correct;
      const pts = data.points_earned || 0;
      myScore = data.total_score;

      // ── 若是重連場景(後端有送 options),更新 currentOptions 避免顯示空白/路徑 ──
      if (Array.isArray(data.options) && data.options.length > 0) {
        currentOptions = data.options;
      }
      const optType = data.option_type || currentOptionType || 'text';
      currentOptionType = optType;

      // ── Top bar: correct answer label ──
      let ansLabel = '';
      if (optType === 'image') {
        ansLabel = LABELS[data.correct] || '';
      } else {
        ansLabel = data.correct_text || '';
      }
      document.getElementById('reveal-answer-label').textContent = ansLabel;

      // ── Media area: big image or text ──
      const mediaArea = document.getElementById('reveal-media-area');
      mediaArea.innerHTML = '';
      if (data.reveal_media) {
        const isVideo = /\.(mp4|webm|mov)(\?|$)/i.test(data.reveal_media);
        if (isVideo) {
          const v = document.createElement('video');
          v.src = data.reveal_media; v.autoplay = true; v.loop = true;
          v.muted = false; v.playsInline = true; v.controls = false;
          mediaArea.appendChild(v);
        } else {
          const img = document.createElement('img');
          img.src = data.reveal_media; img.alt = '揭曉';
          mediaArea.appendChild(img);
        }
      } else if (optType === 'image' && currentOptions[data.correct]) {
        const img = document.createElement('img');
        img.src = currentOptions[data.correct]; img.alt = '正確答案';
        mediaArea.appendChild(img);
      } else {
        const div = document.createElement('div');
        div.className = 'reveal-text-big';
        div.textContent = data.correct_text || '';
        mediaArea.appendChild(div);
      }

      // ── Bottom personal result bar ──
      document.getElementById('reveal-p-icon').textContent  = isCorrect ? '🎉' : (data.answered ? '😅' : '😶');
      document.getElementById('reveal-p-label').textContent = isCorrect ? '答對了！' : (data.answered ? '答錯了...' : '沒有作答');
      const ptsEl2 = document.getElementById('reveal-p-pts');
      ptsEl2.textContent = isCorrect ? `+${pts} 分` : '+0 分';
      ptsEl2.className = `reveal-personal-pts ${isCorrect ? 'correct' : 'wrong'}`;
      document.getElementById('reveal-p-total').textContent = `累積 ${myScore} 分`;

      if (isCorrect) sfxCorrect(); else sfxWrong();
      showScreen('reveal');
      break;
    }

    case 'personal_result':
      // 已由 answer_reveal 取代，忽略
      break;

    case 'leaderboard':
      buildLeaderboard(data.leaderboard, 'lb-rows', data.is_final);
      showScreen('leaderboard');
      break;

    case 'game_finish':
      buildLeaderboard(data.leaderboard, 'final-lb-rows', true);
      showScreen('finish');
      break;

    case 'game_reset':
      myScore = 0;
      myNickname = '';
      currentOptions = []; currentOptionType = 'text';
      clearNickname();  // 重置遊戲時清掉本地暱稱,讓玩家重新輸入
      document.getElementById('nickname-input').value = '';
      document.getElementById('btn-join').disabled = false;
      showScreen('join');
      break;
  }
}

// ── 建立選項按鈕 ──
function buildOptions(options, type) {
  const list = document.getElementById('options-list');
  list.innerHTML = '';
  list.classList.toggle('image-mode', type === 'image');
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `opt-btn ${LABELS[i]}`;
    btn.id = `opt-${i}`;
    const icon = document.createElement('div');
    icon.className = 'opt-icon';
    icon.textContent = LABELS[i];
    btn.appendChild(icon);
    if (type === 'image') {
      const img = document.createElement('img');
      img.src = opt; img.className = 'opt-img'; img.alt = LABELS[i];
      btn.appendChild(img);
    } else {
      const span = document.createElement('span');
      span.textContent = opt;
      btn.appendChild(span);
    }
    btn.onclick = () => submitAnswer(i);
    list.appendChild(btn);
  });
}

// ── 送出答案 ──
function submitAnswer(optIndex) {
  if (timerExpired) return;  // 時間到後不接受答題
  sfxTap();
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  document.getElementById(`opt-${optIndex}`)?.classList.add('selected');
  sendAction('answer', { option: optIndex });

  // 切到「已選擇」畫面，計時器繼續
  buildSelectedScreen(optIndex);
  showScreen('selected');
}

// ── 建立「已選擇」畫面內容 ──
function buildSelectedScreen(optIdx) {
  const area = document.getElementById('sel-media-area');
  if (!area) return;
  area.innerHTML = '';

  const label = LABELS[optIdx];

  // 先放圖片或文字內容
  if (currentOptionType === 'image' && currentOptions[optIdx]) {
    const img = document.createElement('img');
    img.src = currentOptions[optIdx];
    img.alt = label;
    area.appendChild(img);
  } else if (currentOptions[optIdx]) {
    const div = document.createElement('div');
    div.className = 'sel-text-big';
    div.textContent = currentOptions[optIdx];
    area.appendChild(div);
  }

  // 疊上 info-bar（圖片題：中央；文字題：頂部）
  const infoBar = document.createElement('div');
  infoBar.className = 'sel-info-bar';
  infoBar.id = 'sel-info-bar';
  infoBar.textContent = `你選擇的是：${label}`;
  area.appendChild(infoBar);
}

// ── 排行榜 ──
function buildLeaderboard(list, containerId, isFinal) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  const myRankEl = document.getElementById('lb-my-rank');
  const icons = ['🥇','🥈','🥉'];
  const SHOW_TOP = 10;

  let myItem = null;
  list.forEach(item => {
    if (item.nickname === myNickname) myItem = item;
  });

  // 顯示前 10 名
  const topList = list.slice(0, SHOW_TOP);
  let myInTop = false;
  topList.forEach((item, i) => {
    if (item.nickname === myNickname) myInTop = true;
    const row = document.createElement('div');
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
    row.className = `lb-row ${rankClass}`;
    const rankNum = document.createElement('div');
    rankNum.className = 'lb-rank-num';
    rankNum.textContent = i < 3 ? icons[i] : item.rank;
    const name = document.createElement('div');
    name.className = 'lb-name';
    name.textContent = item.nickname + (item.nickname === myNickname ? ' 👈' : '');
    const score = document.createElement('div');
    score.className = 'lb-score';
    score.textContent = item.score.toLocaleString() + ' 分';
    row.appendChild(rankNum); row.appendChild(name); row.appendChild(score);
    el.appendChild(row);
  });

  // 超出前 10 名時，額外顯示自己那行
  if (myItem && !myInTop) {
    const sep = document.createElement('div');
    sep.style.cssText = 'text-align:center;color:var(--text-muted);font-size:0.75rem;padding:6px 0;letter-spacing:3px;';
    sep.textContent = '· · ·';
    el.appendChild(sep);
    const row = document.createElement('div');
    row.className = 'lb-row rank-other';
    row.style.borderColor = 'var(--gold)';
    const rankNum = document.createElement('div');
    rankNum.className = 'lb-rank-num';
    rankNum.textContent = myItem.rank;
    const name = document.createElement('div');
    name.className = 'lb-name';
    name.textContent = myItem.nickname + ' 👈';
    const score = document.createElement('div');
    score.className = 'lb-score';
    score.textContent = myItem.score.toLocaleString() + ' 分';
    row.appendChild(rankNum); row.appendChild(name); row.appendChild(score);
    el.appendChild(row);
  }

  if (myRankEl) {
    myRankEl.textContent = myItem ? `你目前排名第 ${myItem.rank} 名` : '';
    myRankEl.style.display = myItem ? '' : 'none';
  }
}

document.getElementById('nickname-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});
document.addEventListener('touchstart', ensureAudio);
document.addEventListener('click', ensureAudio);

// 頁面載入時:如有暫存暱稱,自動填入並準備重連
tryAutoRejoin();
// 自動初始化 WebSocket（若 tryAutoRejoin 已設 pendingJoin,onopen 會自動 send player msg）
connectWS();
</script>
</body>
</html>
