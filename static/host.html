<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮問答 — MC 控制台</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #080810;
    --bg-card:    #12121E;
    --bg-glass:   rgba(255,255,255,0.04);
    --border:     rgba(255,255,255,0.08);
    --gold:       #C9A96E;
    --gold-light: #F0D080;
    --gold-glow:  rgba(201,169,110,0.25);
    --text-main:  #F5F0E8;
    --text-muted: #8888A8;
    --opt-A:      #B84D6A;
    --opt-B:      #3D6DB5;
    --opt-C:      #B08030;
    --opt-D:      #4A9460;
    --correct:    #4ADE80;
    --wrong:      #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #screen-login {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px;
    background: var(--bg-deep);
    position: relative;
  }
  #screen-login::before {
    content: '';
    position: absolute;
    top: -30vh; left: 50%; transform: translateX(-50%);
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(201,169,110,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-icon { font-size: 2.5rem; filter: drop-shadow(0 0 12px var(--gold-glow)); }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem; font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 20px var(--gold-glow);
    position: relative;
  }
  .login-input {
    padding: 14px 20px; font-size: 1.1rem; width: 300px;
    font-family: 'Nunito', sans-serif; font-weight: 600;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg-card); color: var(--text-main);
    text-align: center; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .login-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-glow);
  }
  .login-btn {
    padding: 14px 48px; font-size: 1.05rem; font-weight: 800;
    font-family: 'Nunito', sans-serif;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0a0a14; cursor: pointer;
    box-shadow: 0 4px 20px var(--gold-glow);
    transition: transform 0.1s, box-shadow 0.2s;
    position: relative;
  }
  .login-btn:active { transform: scale(0.97); }
  .login-error { color: #ff6b6b; font-size: 0.9rem; font-weight: 600; }

  /* ── MAIN ── */
  #screen-main { display: none; }

  /* Header */
  .header {
    background: var(--bg-card);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 10px;
  }
  .header-title span { color: var(--text-muted); font-size: 0.9rem; font-family: 'Nunito', sans-serif; font-weight: 600; }

  /* 連線狀態指示燈 */
  #ws-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #666; flex-shrink: 0;
    transition: background 0.3s;
  }
  #ws-dot.connected    { background: var(--correct); box-shadow: 0 0 6px rgba(74,222,128,0.6); }
  #ws-dot.connecting   { background: #f59e0b; animation: blink 0.8s ease-in-out infinite; }
  #ws-dot.disconnected { background: #f87171; }

  .status-badge {
    padding: 5px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .status-badge.lobby      { background: rgba(61,109,181,0.2); color: #5b9bd5; border: 1px solid rgba(61,109,181,0.4); }
  .status-badge.category   { background: rgba(201,169,110,0.18); color: var(--gold-light); border: 1px solid rgba(201,169,110,0.4); }
  .status-badge.question   { background: rgba(74,222,128,0.15); color: var(--correct); border: 1px solid rgba(74,222,128,0.3); }
  .status-badge.reveal     { background: rgba(201,169,110,0.15); color: var(--gold-light); border: 1px solid rgba(201,169,110,0.3); }
  .status-badge.fastest    { background: rgba(255,180,80,0.18); color: #ffcf72; border: 1px solid rgba(255,180,80,0.4); }
  .status-badge.leaderboard { background: rgba(139,92,246,0.2); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
  .status-badge.finished   { background: rgba(226,27,60,0.15); color: #f87171; border: 1px solid rgba(226,27,60,0.3); }

  .fastest-summary {
    background: linear-gradient(135deg, rgba(255,180,80,0.10), rgba(255,200,120,0.04));
    border: 1px solid rgba(255,180,80,0.35);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .fastest-summary .fs-title {
    font-size: 0.7rem; color: #ffcf72;
    text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
    margin-bottom: 8px;
  }
  .fastest-summary .fs-hero {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 900;
    color: var(--gold-light); margin-bottom: 8px;
  }
  .fastest-summary .fs-hero-time {
    font-size: 0.85rem; color: var(--correct); font-weight: 700;
    margin-left: 8px;
  }
  .fastest-summary .fs-opts {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 6px;
  }
  .fastest-summary .fs-opt {
    flex: 1 1 calc(50% - 4px);
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--bg-glass);
    border: 1px solid var(--border);
  }
  .fastest-summary .fs-opt.correct {
    border-color: var(--correct);
    background: rgba(74,222,128,0.08);
  }
  .fastest-summary .fs-opt-label { font-weight: 900; margin-right: 4px; }
  .fastest-summary .fs-opt.A .fs-opt-label { color: var(--opt-A); }
  .fastest-summary .fs-opt.B .fs-opt-label { color: var(--opt-B); }
  .fastest-summary .fs-opt.C .fs-opt-label { color: var(--opt-C); }
  .fastest-summary .fs-opt.D .fs-opt-label { color: var(--opt-D); }
  .fastest-summary .fs-opt-count { color: var(--text-main); font-weight: 700; }
  .fastest-summary .fs-opt-fast { color: var(--text-muted); font-size: 0.7rem; display: block; margin-top: 3px; }

  .cat-intro-info {
    background: linear-gradient(135deg, rgba(201,169,110,0.12), rgba(240,208,128,0.06));
    border: 1px solid var(--gold);
    border-radius: 14px;
    padding: 18px 22px;
    text-align: center;
    box-shadow: 0 0 24px var(--gold-glow);
  }
  .cat-intro-info .cat-tag {
    font-size: 0.7rem; color: var(--gold);
    text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
    margin-bottom: 8px;
  }
  .cat-intro-info .cat-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 900;
    color: var(--gold-light); letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .cat-intro-info .cat-meta {
    font-size: 0.85rem; color: var(--text-muted); font-weight: 600;
  }

  .main-body {
    display: block;
    min-height: calc(100vh - 53px - 110px);
  }

  /* ── 控制區 ── */
  .ctrl-panel {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .info-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .info-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 22px;
    flex: 1; min-width: 110px;
    transition: border-color 0.2s;
  }
  .info-card:hover { border-color: rgba(201,169,110,0.2); }
  .info-card .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .info-card .value { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--gold-light); }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: -8px;
  }

  /* 控制按鈕 */
  .ctrl-btn {
    width: 100%;
    padding: 16px 20px;
    font-size: 1rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    letter-spacing: 0.3px;
  }
  .ctrl-btn:active { transform: scale(0.98); }
  .ctrl-btn:disabled { filter: brightness(0.3); cursor: not-allowed; box-shadow: none !important; }

  .btn-start {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0a0a14;
    box-shadow: 0 4px 20px var(--gold-glow);
    font-size: 1.05rem;
  }
  .btn-start:not(:disabled):hover { box-shadow: 0 6px 28px rgba(201,169,110,0.4); }

  .btn-reveal {
    background: linear-gradient(135deg, #d97706, #fbbf24);
    color: #0a0a14;
    box-shadow: 0 4px 16px rgba(217,119,6,0.3);
  }
  .btn-reveal:not(:disabled):hover { box-shadow: 0 6px 24px rgba(251,191,36,0.4); }

  .btn-continue {
    background: linear-gradient(135deg, #5b21b6, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 16px rgba(139,92,246,0.3);
  }
  .btn-continue:not(:disabled):hover { box-shadow: 0 6px 24px rgba(139,92,246,0.4); }

  .btn-reset {
    background: rgba(226,27,60,0.15);
    color: #f87171;
    border: 1px solid rgba(226,27,60,0.3);
    font-size: 0.9rem;
  }
  .btn-reset:not(:disabled):hover { background: rgba(226,27,60,0.25); }

  .btn-reload {
    background: var(--bg-card);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .btn-reload:not(:disabled):hover { border-color: var(--gold); color: var(--gold-light); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* 當前題目預覽 */
  .q-preview {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }
  .q-preview .q-num { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .q-preview .q-txt { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; line-height: 1.5; color: var(--text-main); }
  .q-preview .opts  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt-preview {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-glass);
    border: 1px solid var(--border);
  }
  .opt-preview.A { border-color: rgba(184,77,106,0.4); }
  .opt-preview.B { border-color: rgba(61,109,181,0.4); }
  .opt-preview.C { border-color: rgba(176,128,48,0.4); }
  .opt-preview.D { border-color: rgba(74,148,96,0.4); }
  .opt-preview.correct { outline: 2px solid var(--correct); box-shadow: 0 0 8px rgba(74,222,128,0.2); }
  .opt-label { font-weight: 900; font-size: 0.85rem; }
  .opt-preview.A .opt-label { color: var(--opt-A); }
  .opt-preview.B .opt-label { color: var(--opt-B); }
  .opt-preview.C .opt-label { color: var(--opt-C); }
  .opt-preview.D .opt-label { color: var(--opt-D); }

  /* 答題進度條 — dark track, gold fill */
  .progress-bar-wrap {
    height: 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 10px;
    transition: width 0.4s ease;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 800; color: #0a0a14;
    box-shadow: 0 0 8px var(--gold-glow);
  }
  .answered-text { font-size: 0.8rem; color: var(--text-muted); text-align: right; font-weight: 600; margin-top: 4px; }


  /* ── LOG ── */
  .log-area {
    background: #04040c;
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    font-size: 0.72rem;
    color: var(--text-muted);
    max-height: 110px;
    min-height: 110px;
    overflow-y: auto;
    font-family: 'Courier New', Courier, monospace;
    line-height: 1.7;
  }
  .log-area div { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 1px 0; }
  .log-area div:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-icon">🎛️</div>
  <div class="login-title">MC 控制台</div>
  <input type="password" id="pw-input" class="login-input" placeholder="輸入密碼" autocomplete="off">
  <button class="login-btn" onclick="doLogin()">登入</button>
  <div id="login-error" class="login-error"></div>
</div>

<!-- MAIN -->
<div id="screen-main">
  <div class="header">
    <div class="header-title">🎛️ 婚禮問答 <span>— MC 控制台</span><div id="ws-dot" class="disconnected" title="連線狀態"></div></div>
    <div id="phase-badge" class="status-badge lobby">大廳</div>
  </div>

  <div class="main-body">
    <!-- 控制區 -->
    <div class="ctrl-panel">
      <div class="info-row">
        <div class="info-card">
          <div class="label">玩家人數</div>
          <div class="value" id="info-players">0</div>
        </div>
        <div class="info-card">
          <div class="label">目前題數</div>
          <div class="value" id="info-q">-</div>
        </div>
        <div class="info-card">
          <div class="label">總題數</div>
          <div class="value" id="info-total">0</div>
        </div>
      </div>

      <!-- 答題進度（QUESTION 時顯示）-->
      <div id="answer-progress-section" style="display:none">
        <div class="section-title">答題進度</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%">0%</div>
        </div>
        <div class="answered-text" id="answered-text">0 / 0 人已答</div>
      </div>

      <!-- 類別過場資訊（CATEGORY_INTRO 階段顯示）-->
      <div id="cat-intro-section" style="display:none">
        <div class="section-title">即將進入</div>
        <div class="cat-intro-info">
          <div class="cat-tag" id="cat-intro-tag">CHAPTER 1 / 5</div>
          <div class="cat-name" id="cat-intro-name">類別名稱</div>
          <div class="cat-meta" id="cat-intro-meta">共 X 題</div>
        </div>
      </div>

      <!-- 最快榜摘要（FASTEST_BREAKDOWN 階段顯示）-->
      <div id="fastest-summary-section" style="display:none">
        <div class="section-title">最快榜</div>
        <div class="fastest-summary" id="fastest-summary"></div>
      </div>

      <!-- 當前題目預覽 -->
      <div id="q-preview-section" style="display:none">
        <div class="section-title">當前題目</div>
        <div class="q-preview">
          <div class="q-num" id="prev-num">第 1 題</div>
          <div class="q-txt" id="prev-txt">-</div>
          <div class="opts" id="prev-opts"></div>
        </div>
      </div>

      <!-- 主要控制按鈕 -->
      <div class="section-title">遊戲控制</div>
      <button id="btn-start"    class="ctrl-btn btn-start"    onclick="sendCmd('start_game')">▶ 開始遊戲</button>
      <button id="btn-continue" class="ctrl-btn btn-continue" onclick="doContinue()" disabled>📢 公佈答案</button>

      <button class="ctrl-btn btn-reset"  onclick="confirmReset()">⚠️ 重置遊戲</button>
    </div>

  </div>

  <div class="log-area" id="log-area"></div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/quiz/ws`;
let ws, password = '';
let players = {};
let currentPhase = 'LOBBY';
let reconnectTimer = null;   // 防止重複排程

// ── 連線狀態燈 ──
function setDot(state) { // 'connected' | 'connecting' | 'disconnected'
  const dot = document.getElementById('ws-dot');
  if (dot) dot.className = state;
}

function doLogin() {
  password = document.getElementById('pw-input').value;
  document.getElementById('login-error').textContent = '';
  connectWS();
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function connectWS() {
  // ── Guard：已在 CONNECTING 或 OPEN 就不重複建立 ──
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;

  clearTimeout(reconnectTimer);
  setDot('connecting');

  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'host', password }));
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    setDot('disconnected');
    if (!password) return;          // 尚未登入，不自動重連
    log('⚠️ 連線中斷，重新連線...');
    scheduleReconnect();
  };
  ws.onerror = () => ws.close();
}

function scheduleReconnect() {
  if (reconnectTimer) return;       // 已有排程，不重複
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connectWS();
  }, 1000);                         // 1 秒（原本 2 秒，縮短讓 iOS 回來更快恢復）
}

// ── iOS 關鍵修復：螢幕亮回來時立刻重連 ──
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && password) {
    if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
      log('📱 頁面恢復，重新連線...');
      connectWS();
    }
  }
});

function sendCmd(action) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action }));
    log(`> ${action}`);
  } else {
    log('⚠️ 連線未就緒，請稍後再按...');
    // 立刻嘗試重連，讓用戶只需再按一次
    if (password) connectWS();
  }
}

function confirmReset() {
  if (confirm('確定要重置遊戲嗎？所有玩家將被踢出。')) sendCmd('reset_game');
}

function doContinue() {
  if (currentPhase === 'CATEGORY_INTRO') {
    sendCmd('start_category_questions');
  } else if (currentPhase === 'QUESTION_ENDED') {
    sendCmd('reveal_answer');
  } else if (currentPhase === 'REVEAL') {
    sendCmd('show_fastest');
  } else if (currentPhase === 'FASTEST_BREAKDOWN') {
    sendCmd('show_leaderboard');
  } else if (currentPhase === 'LEADERBOARD') {
    sendCmd('next_question');
  }
}

function log(msg) {
  const el = document.getElementById('log-area');
  const time = new Date().toLocaleTimeString();
  el.innerHTML += `<div>[${time}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ── 按鈕狀態管理 ──
function updateButtons(phase) {
  const b = id => document.getElementById(id);
  currentPhase = phase;
  // LOBBY 階段才顯示「開始遊戲」按鈕,其他階段隱藏避免視覺干擾(主控按鈕是 btn-continue)
  const startBtn = b('btn-start');
  startBtn.disabled = phase !== 'LOBBY';
  startBtn.style.display = phase === 'LOBBY' ? '' : 'none';

  const btn = b('btn-continue');
  if (phase === 'CATEGORY_INTRO') {
    btn.disabled = false;
    btn.textContent = '🎬 開始本類別';
    btn.style.background = 'linear-gradient(135deg, #C9A96E, #F0D080)';
    btn.style.color = '#0a0a14';
  } else if (phase === 'QUESTION_ENDED') {
    btn.disabled = false;
    btn.textContent = '📢 公佈答案';
    btn.style.background = 'linear-gradient(135deg,#e55,#c33)';
    btn.style.color = '';
  } else if (phase === 'REVEAL') {
    btn.disabled = false;
    btn.textContent = '🎤 顯示最快榜';
    btn.style.background = 'linear-gradient(135deg, #f59e0b, #fbbf24)';
    btn.style.color = '#0a0a14';
  } else if (phase === 'FASTEST_BREAKDOWN') {
    btn.disabled = false;
    btn.textContent = '🏆 排行榜';
    btn.style.background = '';
    btn.style.color = '';
  } else if (phase === 'LEADERBOARD') {
    btn.disabled = false;
    btn.textContent = '⏭ 下一題';
    btn.style.background = '';
    btn.style.color = '';
  } else {
    btn.disabled = true;
    btn.textContent = '📢 公佈答案';
    btn.style.background = '';
    btn.style.color = '';
  }

  document.getElementById('answer-progress-section').style.display =
    (phase === 'QUESTION' || phase === 'QUESTION_ENDED') ? 'block' : 'none';

  document.getElementById('cat-intro-section').style.display =
    (phase === 'CATEGORY_INTRO') ? 'block' : 'none';

  document.getElementById('fastest-summary-section').style.display =
    (phase === 'FASTEST_BREAKDOWN') ? 'block' : 'none';

  // CATEGORY_INTRO 時隱藏「當前題目」預覽,避免提前洩題
  if (phase === 'CATEGORY_INTRO') {
    document.getElementById('q-preview-section').style.display = 'none';
  }

  const phaseMap = { LOBBY:'大廳', CATEGORY_INTRO:'類別過場', QUESTION:'作答中', QUESTION_ENDED:'等待公佈', REVEAL:'揭曉', FASTEST_BREAKDOWN:'最快榜', LEADERBOARD:'排行榜', FINISHED:'結束' };
  const badgeMap = { LOBBY:'lobby', CATEGORY_INTRO:'category', QUESTION:'question', QUESTION_ENDED:'question', REVEAL:'reveal', FASTEST_BREAKDOWN:'fastest', LEADERBOARD:'leaderboard', FINISHED:'finished' };
  const badge = document.getElementById('phase-badge');
  badge.textContent = phaseMap[phase] || phase;
  badge.className = `status-badge ${badgeMap[phase] || ''}`;
}

// ── 題目預覽 ──
function showQuestionPreview(data) {
  document.getElementById('q-preview-section').style.display = 'block';
  document.getElementById('prev-num').textContent = `第 ${data.index+1} / ${data.total} 題`;
  document.getElementById('prev-txt').textContent = data.text;
  const opts = document.getElementById('prev-opts');
  opts.innerHTML = '';
  const LABELS = ['A','B','C','D'];
  data.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = `opt-preview ${LABELS[i]}${i===data.correct?'':''} `;
    // correct 只在 reveal 後顯示，這裡不顯示
    div.innerHTML = `<span class="opt-label">${LABELS[i]}</span> ${typeof opt === 'string' ? opt.substring(0,30) : '[圖片]'}`;
    opts.appendChild(div);
  });
  // 存 correct 用於 reveal 後標示
  opts._correct = data.correct;
}

function markCorrectOption(correct) {
  const opts = document.getElementById('prev-opts');
  opts.querySelectorAll('.opt-preview').forEach((el, i) => {
    if (i === correct) el.classList.add('correct');
  });
}

// ── 玩家名單 ──
function updatePlayerList(data) {
  players = {};
  if (data.players) {
    data.players.forEach(p => { players[p.nickname] = p; });
  }
  renderPlayers();
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  if (!list) return;
  const names = Object.values(players);
  if (names.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted); font-size:0.85rem; font-weight:600;">等待玩家加入...</div>';
    return;
  }
  names.sort((a,b) => (b.score||0) - (a.score||0));
  list.innerHTML = names.map(p => `
    <div class="player-item">
      <span class="player-name">${p.nickname}</span>
      <span class="player-score">${(p.score||0).toLocaleString()} 分</span>
    </div>
  `).join('');
}

// ── 訊息處理 ──
function handleMsg(data) {
  switch(data.type) {
    case 'error':
      document.getElementById('login-error').textContent = data.msg;
      break;

    case 'host_welcome':
      document.getElementById('screen-login').style.display = 'none';
      document.getElementById('screen-main').style.display = 'block';
      document.getElementById('info-total').textContent = data.total_questions;
      document.getElementById('info-players').textContent = data.player_count;
      document.getElementById('info-q').textContent = data.current_index >= 0 ? data.current_index + 1 : '-';
      updateButtons(data.phase);
      setDot('connected');
      log('✅ 已連線');
      break;

    case 'player_count':
      document.getElementById('info-players').textContent = data.count;
      // 建立玩家清單
      players = {};
      data.nicknames.forEach(n => { players[n] = { nickname: n, score: 0 }; });
      renderPlayers();
      log(`玩家加入，目前 ${data.count} 人`);
      break;

    case 'category_intro':
      updateButtons('CATEGORY_INTRO');
      document.getElementById('cat-intro-tag').textContent =
        `CHAPTER ${data.category_index} / ${data.category_total}`;
      document.getElementById('cat-intro-name').textContent = data.category;
      document.getElementById('cat-intro-meta').textContent = `共 ${data.questions_in_category} 題`;
      document.getElementById('info-q').textContent = (data.next_question_index + 1) + ' ⏳';
      log(`🎬 進入類別：${data.category}（共 ${data.questions_in_category} 題）`);
      break;

    case 'question_start':
      document.getElementById('info-q').textContent = data.index + 1;
      updateButtons(data.phase === 'QUESTION_ENDED' ? 'QUESTION_ENDED' : 'QUESTION');
      showQuestionPreview(data);
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('progress-bar').textContent = '0%';
      document.getElementById('answered-text').textContent = `0 / ${data.total} 人已答`;
      log(`📝 第 ${data.index+1} 題開始`);
      break;

    case 'answer_progress':
      const pct = data.total > 0 ? Math.round(data.answered / data.total * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-bar').textContent = pct > 10 ? pct + '%' : '';
      document.getElementById('answered-text').textContent = `${data.answered} / ${data.total} 人已答`;
      break;

    case 'timer_ended':
      updateButtons('QUESTION_ENDED');
      log('⏰ 計時結束，可按「公佈答案」');
      break;

    case 'answer_reveal':
      updateButtons('REVEAL');
      markCorrectOption(data.correct);
      // 更新玩家分數
      if (data.leaderboard) {
        data.leaderboard.forEach(p => {
          if (players[p.nickname]) players[p.nickname].score = p.score;
          else players[p.nickname] = { nickname: p.nickname, score: p.score };
        });
        renderPlayers();
      }
      log(`✅ 答案公佈：${['A','B','C','D'][data.correct]}`);
      break;

    case 'option_breakdown':
      updateButtons('FASTEST_BREAKDOWN');
      renderFastestSummary(data);
      log(`🎤 最快榜：${data.fastest_correct ? data.fastest_correct.nickname + ' ' + data.fastest_correct.time.toFixed(2) + 's' : '無人答對'}`);
      break;

    case 'leaderboard':
      updateButtons('LEADERBOARD');
      log('🏆 排行榜顯示');
      break;

    case 'game_finish':
      updateButtons('FINISHED');
      log('🎉 遊戲結束');
      break;

    case 'game_reset':
      players = {};
      renderPlayers();
      document.getElementById('info-q').textContent = '-';
      document.getElementById('q-preview-section').style.display = 'none';
      updateButtons('LOBBY');
      log('⚠️ 遊戲已重置');
      break;

    case 'questions_loaded':
      document.getElementById('info-total').textContent = data.count;
      log(`🔄 題目重新載入：${data.count} 題`);
      break;
  }
}

function id(x) { return document.getElementById(x); }

// ── 最快榜 host 摘要 ──
function renderFastestSummary(data) {
  const el = document.getElementById('fastest-summary');
  const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const heroHtml = data.fastest_correct
    ? `<div class="fs-title">🥇 最快答對</div>
       <div class="fs-hero">${escapeHtml(data.fastest_correct.nickname)}<span class="fs-hero-time">${data.fastest_correct.time.toFixed(2)} 秒</span></div>`
    : `<div class="fs-title">🥇 最快答對</div>
       <div class="fs-hero" style="font-size:1rem;color:var(--text-muted);font-style:italic">這題沒人答對 😅</div>`;

  const optsHtml = '<div class="fs-opts">' + data.options.map(opt => {
    const isCorrect = opt.index === data.correct;
    const fastest = opt.fastest
      ? `<span class="fs-opt-fast">最快：${escapeHtml(opt.fastest.nickname)} (${opt.fastest.time.toFixed(2)}s)</span>`
      : `<span class="fs-opt-fast" style="font-style:italic;opacity:0.5">無人選</span>`;
    return `<div class="fs-opt ${opt.label}${isCorrect ? ' correct' : ''}">
      <span class="fs-opt-label">${opt.label}</span>
      <span class="fs-opt-count">${opt.count} 人</span>
      ${fastest}
    </div>`;
  }).join('') + '</div>';

  el.innerHTML = heroHtml + optsHtml;
}
</script>
