<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮問答 — MC 控制台</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #080810;
    --bg-card:    #12121E;
    --bg-glass:   rgba(255,255,255,0.04);
    --border:     rgba(255,255,255,0.08);
    --gold:       #C9A96E;
    --gold-light: #F0D080;
    --gold-glow:  rgba(201,169,110,0.25);
    --text-main:  #F5F0E8;
    --text-muted: #8888A8;
    --opt-A:      #B84D6A;
    --opt-B:      #3D6DB5;
    --opt-C:      #B08030;
    --opt-D:      #4A9460;
    --correct:    #4ADE80;
    --wrong:      #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #screen-login {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 24px;
    background: var(--bg-deep);
    position: relative;
  }
  #screen-login::before {
    content: '';
    position: absolute;
    top: -30vh; left: 50%; transform: translateX(-50%);
    width: 60vw; height: 60vh;
    background: radial-gradient(ellipse, rgba(201,169,110,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-icon { font-size: 2.5rem; filter: drop-shadow(0 0 12px var(--gold-glow)); }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem; font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 20px var(--gold-glow);
    position: relative;
  }
  .login-input {
    padding: 14px 20px; font-size: 1.1rem; width: 300px;
    font-family: 'Nunito', sans-serif; font-weight: 600;
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--bg-card); color: var(--text-main);
    text-align: center; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .login-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-glow);
  }
  .login-btn {
    padding: 14px 48px; font-size: 1.05rem; font-weight: 800;
    font-family: 'Nunito', sans-serif;
    border: none; border-radius: 50px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0a0a14; cursor: pointer;
    box-shadow: 0 4px 20px var(--gold-glow);
    transition: transform 0.1s, box-shadow 0.2s;
    position: relative;
  }
  .login-btn:active { transform: scale(0.97); }
  .login-error { color: #ff6b6b; font-size: 0.9rem; font-weight: 600; }

  /* ── MAIN ── */
  #screen-main { display: none; }

  /* Header */
  .header {
    background: var(--bg-card);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 1px;
  }
  .header-title span { color: var(--text-muted); font-size: 0.9rem; font-family: 'Nunito', sans-serif; font-weight: 600; }

  .status-badge {
    padding: 5px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .status-badge.lobby      { background: rgba(61,109,181,0.2); color: #5b9bd5; border: 1px solid rgba(61,109,181,0.4); }
  .status-badge.question   { background: rgba(74,222,128,0.15); color: var(--correct); border: 1px solid rgba(74,222,128,0.3); }
  .status-badge.reveal     { background: rgba(201,169,110,0.15); color: var(--gold-light); border: 1px solid rgba(201,169,110,0.3); }
  .status-badge.leaderboard { background: rgba(139,92,246,0.2); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
  .status-badge.finished   { background: rgba(226,27,60,0.15); color: #f87171; border: 1px solid rgba(226,27,60,0.3); }

  .main-body {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    min-height: calc(100vh - 53px - 110px);
  }

  /* ── 左：控制區 ── */
  .ctrl-panel {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    border-right: 1px solid var(--border);
  }

  .info-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .info-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 22px;
    flex: 1; min-width: 110px;
    transition: border-color 0.2s;
  }
  .info-card:hover { border-color: rgba(201,169,110,0.2); }
  .info-card .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .info-card .value { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--gold-light); }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: -8px;
  }

  /* 控制按鈕 */
  .ctrl-btn {
    width: 100%;
    padding: 16px 20px;
    font-size: 1rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s, filter 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    letter-spacing: 0.3px;
  }
  .ctrl-btn:active { transform: scale(0.98); }
  .ctrl-btn:disabled { filter: brightness(0.3); cursor: not-allowed; box-shadow: none !important; }

  .btn-start {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #0a0a14;
    box-shadow: 0 4px 20px var(--gold-glow);
    font-size: 1.05rem;
  }
  .btn-start:not(:disabled):hover { box-shadow: 0 6px 28px rgba(201,169,110,0.4); }

  .btn-reveal {
    background: linear-gradient(135deg, #d97706, #fbbf24);
    color: #0a0a14;
    box-shadow: 0 4px 16px rgba(217,119,6,0.3);
  }
  .btn-reveal:not(:disabled):hover { box-shadow: 0 6px 24px rgba(251,191,36,0.4); }

  .btn-continue {
    background: linear-gradient(135deg, #5b21b6, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 16px rgba(139,92,246,0.3);
  }
  .btn-continue:not(:disabled):hover { box-shadow: 0 6px 24px rgba(139,92,246,0.4); }

  .btn-reset {
    background: rgba(226,27,60,0.15);
    color: #f87171;
    border: 1px solid rgba(226,27,60,0.3);
    font-size: 0.9rem;
  }
  .btn-reset:not(:disabled):hover { background: rgba(226,27,60,0.25); }

  .btn-reload {
    background: var(--bg-card);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .btn-reload:not(:disabled):hover { border-color: var(--gold); color: var(--gold-light); }

  /* 當前題目預覽 */
  .q-preview {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }
  .q-preview .q-num { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .q-preview .q-txt { font-size: 0.95rem; font-weight: 700; margin-bottom: 14px; line-height: 1.5; color: var(--text-main); }
  .q-preview .opts  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt-preview {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 0.82rem;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-glass);
    border: 1px solid var(--border);
  }
  .opt-preview.A { border-color: rgba(184,77,106,0.4); }
  .opt-preview.B { border-color: rgba(61,109,181,0.4); }
  .opt-preview.C { border-color: rgba(176,128,48,0.4); }
  .opt-preview.D { border-color: rgba(74,148,96,0.4); }
  .opt-preview.correct { outline: 2px solid var(--correct); box-shadow: 0 0 8px rgba(74,222,128,0.2); }
  .opt-label { font-weight: 900; font-size: 0.85rem; }
  .opt-preview.A .opt-label { color: var(--opt-A); }
  .opt-preview.B .opt-label { color: var(--opt-B); }
  .opt-preview.C .opt-label { color: var(--opt-C); }
  .opt-preview.D .opt-label { color: var(--opt-D); }

  /* 答題進度條 — dark track, gold fill */
  .progress-bar-wrap {
    height: 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 10px;
    transition: width 0.4s ease;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; font-weight: 800; color: #0a0a14;
    box-shadow: 0 0 8px var(--gold-glow);
  }
  .answered-text { font-size: 0.8rem; color: var(--text-muted); text-align: right; font-weight: 600; margin-top: 4px; }

  /* ── 右：玩家名單 ── */
  .player-panel {
    padding: 20px;
    overflow-y: auto;
    max-height: calc(100vh - 53px - 110px);
    background: var(--bg-deep);
    border-left: 1px solid var(--border);
  }
  .player-panel-title {
    font-size: 0.75rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 14px; font-weight: 700;
  }
  .player-list { display: flex; flex-direction: column; gap: 6px; }
  .player-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.88rem;
    animation: slideUp 0.3s ease both;
    transition: border-color 0.2s;
  }
  .player-item:hover { border-color: rgba(201,169,110,0.2); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .player-name { font-weight: 700; color: var(--text-main); }
  .player-score { color: var(--gold-light); font-size: 0.82rem; font-weight: 700; }
  .player-answered { color: var(--correct); font-size: 0.72rem; font-weight: 700; }

  /* ── LOG ── */
  .log-area {
    background: #04040c;
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    font-size: 0.72rem;
    color: var(--text-muted);
    max-height: 110px;
    min-height: 110px;
    overflow-y: auto;
    font-family: 'Courier New', Courier, monospace;
    line-height: 1.7;
  }
  .log-area div { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 1px 0; }
  .log-area div:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-icon">🎛️</div>
  <div class="login-title">MC 控制台</div>
  <input type="password" id="pw-input" class="login-input" placeholder="輸入密碼" autocomplete="off">
  <button class="login-btn" onclick="doLogin()">登入</button>
  <div id="login-error" class="login-error"></div>
</div>

<!-- MAIN -->
<div id="screen-main">
  <div class="header">
    <div class="header-title">🎛️ 婚禮問答 <span>— MC 控制台</span></div>
    <div id="phase-badge" class="status-badge lobby">大廳</div>
  </div>

  <div class="main-body">
    <!-- 控制區 -->
    <div class="ctrl-panel">
      <div class="info-row">
        <div class="info-card">
          <div class="label">玩家人數</div>
          <div class="value" id="info-players">0</div>
        </div>
        <div class="info-card">
          <div class="label">目前題數</div>
          <div class="value" id="info-q">-</div>
        </div>
        <div class="info-card">
          <div class="label">總題數</div>
          <div class="value" id="info-total">0</div>
        </div>
      </div>

      <!-- 答題進度（QUESTION 時顯示）-->
      <div id="answer-progress-section" style="display:none">
        <div class="section-title">答題進度</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%">0%</div>
        </div>
        <div class="answered-text" id="answered-text">0 / 0 人已答</div>
      </div>

      <!-- 當前題目預覽 -->
      <div id="q-preview-section" style="display:none">
        <div class="section-title">當前題目</div>
        <div class="q-preview">
          <div class="q-num" id="prev-num">第 1 題</div>
          <div class="q-txt" id="prev-txt">-</div>
          <div class="opts" id="prev-opts"></div>
        </div>
      </div>

      <!-- 主要控制按鈕 -->
      <div class="section-title">遊戲控制</div>
      <button id="btn-start"    class="ctrl-btn btn-start"    onclick="sendCmd('start_game')">▶ 開始遊戲</button>
      <button id="btn-reveal"   class="ctrl-btn btn-reveal"   onclick="sendCmd('reveal_answer')" disabled>📊 公佈答案</button>
      <button id="btn-continue" class="ctrl-btn btn-continue" onclick="doContinue()" disabled>🏆 排行榜 &amp; 下一題</button>

      <button class="ctrl-btn btn-reload" onclick="sendCmd('reload_questions')">🔄 重新載入題目</button>
      <button class="ctrl-btn btn-reset"  onclick="confirmReset()">⚠️ 重置遊戲</button>
    </div>

    <!-- 玩家名單 -->
    <div class="player-panel">
      <div class="player-panel-title">玩家名單</div>
      <div class="player-list" id="player-list">
        <div style="color:var(--text-muted); font-size:0.85rem; font-weight:600;">等待玩家加入...</div>
      </div>
    </div>
  </div>

  <div class="log-area" id="log-area"></div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/quiz/ws`;
let ws, password = '';
let players = {};
let currentPhase = 'LOBBY';

function doLogin() {
  password = document.getElementById('pw-input').value;
  document.getElementById('login-error').textContent = '';
  connectWS();
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'host', password }));
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    log('連線斷開，2秒後重連...');
    setTimeout(() => { if (document.getElementById('screen-main').style.display !== 'none') connectWS(); }, 2000);
  };
  ws.onerror = () => ws.close();
}

function sendCmd(action) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ action }));
    log(`> ${action}`);
  }
}

function confirmReset() {
  if (confirm('確定要重置遊戲嗎？所有玩家將被踢出。')) sendCmd('reset_game');
}

function doContinue() {
  if (currentPhase === 'REVEAL') {
    sendCmd('show_leaderboard');
  } else if (currentPhase === 'LEADERBOARD') {
    sendCmd('next_question');
  }
}

function log(msg) {
  const el = document.getElementById('log-area');
  const time = new Date().toLocaleTimeString();
  el.innerHTML += `<div>[${time}] ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ── 按鈕狀態管理 ──
function updateButtons(phase) {
  const b = id => document.getElementById(id);
  currentPhase = phase;
  b('btn-start').disabled    = phase !== 'LOBBY';
  b('btn-reveal').disabled   = phase !== 'QUESTION';
  b('btn-continue').disabled = phase !== 'REVEAL' && phase !== 'LEADERBOARD';
  b('btn-continue').textContent = phase === 'LEADERBOARD' ? '⏭ 下一題' : '🏆 排行榜 & 下一題';
  document.getElementById('answer-progress-section').style.display = phase === 'QUESTION' ? 'block' : 'none';

  const phaseMap = { LOBBY:'大廳', QUESTION:'作答中', REVEAL:'揭曉', LEADERBOARD:'排行榜', FINISHED:'結束' };
  const badgeMap = { LOBBY:'lobby', QUESTION:'question', REVEAL:'reveal', LEADERBOARD:'leaderboard', FINISHED:'finished' };
  const badge = document.getElementById('phase-badge');
  badge.textContent = phaseMap[phase] || phase;
  badge.className = `status-badge ${badgeMap[phase] || ''}`;
}

// ── 題目預覽 ──
function showQuestionPreview(data) {
  document.getElementById('q-preview-section').style.display = 'block';
  document.getElementById('prev-num').textContent = `第 ${data.index+1} / ${data.total} 題`;
  document.getElementById('prev-txt').textContent = data.text;
  const opts = document.getElementById('prev-opts');
  opts.innerHTML = '';
  const LABELS = ['A','B','C','D'];
  data.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = `opt-preview ${LABELS[i]}${i===data.correct?'':''} `;
    // correct 只在 reveal 後顯示，這裡不顯示
    div.innerHTML = `<span class="opt-label">${LABELS[i]}</span> ${typeof opt === 'string' ? opt.substring(0,30) : '[圖片]'}`;
    opts.appendChild(div);
  });
  // 存 correct 用於 reveal 後標示
  opts._correct = data.correct;
}

function markCorrectOption(correct) {
  const opts = document.getElementById('prev-opts');
  opts.querySelectorAll('.opt-preview').forEach((el, i) => {
    if (i === correct) el.classList.add('correct');
  });
}

// ── 玩家名單 ──
function updatePlayerList(data) {
  players = {};
  if (data.players) {
    data.players.forEach(p => { players[p.nickname] = p; });
  }
  renderPlayers();
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  const names = Object.values(players);
  if (names.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted); font-size:0.85rem; font-weight:600;">等待玩家加入...</div>';
    return;
  }
  names.sort((a,b) => (b.score||0) - (a.score||0));
  list.innerHTML = names.map(p => `
    <div class="player-item">
      <span class="player-name">${p.nickname}</span>
      <span class="player-score">${(p.score||0).toLocaleString()} 分</span>
    </div>
  `).join('');
}

// ── 訊息處理 ──
function handleMsg(data) {
  switch(data.type) {
    case 'error':
      document.getElementById('login-error').textContent = data.msg;
      break;

    case 'host_welcome':
      document.getElementById('screen-login').style.display = 'none';
      document.getElementById('screen-main').style.display = 'block';
      document.getElementById('info-total').textContent = data.total_questions;
      document.getElementById('info-players').textContent = data.player_count;
      document.getElementById('info-q').textContent = data.current_index >= 0 ? data.current_index + 1 : '-';
      updateButtons(data.phase);
      log('✅ 已連線');
      break;

    case 'player_count':
      document.getElementById('info-players').textContent = data.count;
      // 建立玩家清單
      players = {};
      data.nicknames.forEach(n => { players[n] = { nickname: n, score: 0 }; });
      renderPlayers();
      log(`玩家加入，目前 ${data.count} 人`);
      break;

    case 'question_start':
      document.getElementById('info-q').textContent = data.index + 1;
      updateButtons('QUESTION');
      showQuestionPreview(data);
      document.getElementById('progress-bar').style.width = '0%';
      document.getElementById('progress-bar').textContent = '0%';
      document.getElementById('answered-text').textContent = `0 / ${data.total} 人已答`;
      log(`📝 第 ${data.index+1} 題開始`);
      break;

    case 'answer_progress':
      const pct = data.total > 0 ? Math.round(data.answered / data.total * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-bar').textContent = pct > 10 ? pct + '%' : '';
      document.getElementById('answered-text').textContent = `${data.answered} / ${data.total} 人已答`;
      break;

    case 'answer_reveal':
      updateButtons('REVEAL');
      markCorrectOption(data.correct);
      // 更新玩家分數
      if (data.leaderboard) {
        data.leaderboard.forEach(p => {
          if (players[p.nickname]) players[p.nickname].score = p.score;
          else players[p.nickname] = { nickname: p.nickname, score: p.score };
        });
        renderPlayers();
      }
      log(`✅ 答案公佈：${['A','B','C','D'][data.correct]}`);
      break;

    case 'leaderboard':
      updateButtons('LEADERBOARD');
      log('🏆 排行榜顯示');
      break;

    case 'game_finish':
      updateButtons('FINISHED');
      log('🎉 遊戲結束');
      break;

    case 'game_reset':
      players = {};
      renderPlayers();
      document.getElementById('info-q').textContent = '-';
      document.getElementById('q-preview-section').style.display = 'none';
      updateButtons('LOBBY');
      log('⚠️ 遊戲已重置');
      break;

    case 'questions_loaded':
      document.getElementById('info-total').textContent = data.count;
      log(`🔄 題目重新載入：${data.count} 題`);
      break;
  }
}

function id(x) { return document.getElementById(x); }
</script>
