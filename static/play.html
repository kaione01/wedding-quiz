<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>婚禮問答 — 加入遊戲</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #080810;
    --bg-card:    #12121E;
    --bg-glass:   rgba(255,255,255,0.04);
    --border:     rgba(255,255,255,0.08);
    --gold:       #C9A96E;
    --gold-light: #F0D080;
    --gold-glow:  rgba(201,169,110,0.25);
    --text-main:  #F5F0E8;
    --text-muted: #8888A8;
    --opt-A:      #B84D6A;
    --opt-B:      #3D6DB5;
    --opt-C:      #B08030;
    --opt-D:      #4A9460;
    --correct:    #4ADE80;
    --wrong:      #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* 背景光暈 */
  body::before {
    content: '';
    position: fixed;
    top: -30vh; left: -20vw;
    width: 80vw; height: 80vh;
    background: radial-gradient(ellipse, rgba(201,169,110,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── 畫面切換 ── */
  .screen { display: none; width: 100%; max-width: 480px; position: relative; z-index: 1; }
  .screen.active {
    display: flex; flex-direction: column; align-items: center;
    animation: pageIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: scale(0.96) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── JOIN ── */
  #screen-join { gap: 28px; }

  .join-ring {
    font-size: 3rem;
    filter: drop-shadow(0 0 16px var(--gold-glow));
  }

  .join-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 60%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.3;
  }
  .join-sub {
    font-size: 0.95rem;
    color: var(--text-muted);
    text-align: center;
    font-weight: 600;
  }

  /* 底線輸入框 */
  .input-field {
    width: 100%;
    padding: 14px 4px;
    font-size: 1.4rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    border: none;
    border-bottom: 2px solid var(--border);
    border-radius: 0;
    background: transparent;
    color: var(--text-main);
    text-align: center;
    outline: none;
    transition: border-color 0.25s;
  }
  .input-field:focus { border-bottom-color: var(--gold); }
  .input-field::placeholder { color: var(--text-muted); font-weight: 400; }

  /* 金色漸層按鈕 */
  .btn-join {
    width: 100%;
    padding: 18px;
    font-size: 1.15rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    color: #0a0a14;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.2s, opacity 0.2s;
    box-shadow: 0 4px 24px var(--gold-glow);
    letter-spacing: 0.5px;
  }
  .btn-join:active { transform: scale(0.97); }
  .btn-join:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .error-msg { color: #ff6b6b; font-size: 0.9rem; font-weight: 600; min-height: 1.2em; }

  /* ── LOBBY ── */
  #screen-lobby { gap: 28px; text-align: center; }

  .lobby-nickname {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 24px var(--gold-glow);
  }
  .lobby-wait {
    font-size: 1.05rem;
    color: var(--text-muted);
    line-height: 1.7;
    font-weight: 600;
  }
  .lobby-player-count {
    font-size: 0.95rem;
    color: var(--text-muted);
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg-glass);
    font-weight: 600;
  }

  /* 3-ring pulse in gold */
  .pulse-rings {
    position: relative;
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .pulse-rings::before,
  .pulse-rings::after,
  .pulse-rings span {
    content: '';
    position: absolute;
    border: 2px solid var(--gold);
    border-radius: 50%;
    animation: ringPulse 2s ease-out infinite;
    opacity: 0;
  }
  .pulse-rings::before { width: 20px; height: 20px; animation-delay: 0s; }
  .pulse-rings span    { width: 36px; height: 36px; animation-delay: 0.5s; display: block; position: absolute; border: 2px solid var(--gold); border-radius: 50%; }
  .pulse-rings::after  { width: 52px; height: 52px; animation-delay: 1s; }
  .pulse-core {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--gold); box-shadow: 0 0 8px var(--gold-glow);
    position: relative; z-index: 1;
  }
  @keyframes ringPulse {
    0%   { transform: scale(0.6); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* ── QUESTION ── */
  #screen-question { gap: 16px; }
  .q-header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 700;
  }
  .q-timer {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--correct);
    transition: color 0.3s;
  }
  .q-text {
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.55;
    color: var(--text-main);
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    width: 100%;
    backdrop-filter: blur(6px);
  }
  .q-image {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  /* 2×2 grid options */
  .options-list {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .opt-btn {
    padding: 16px 14px;
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    color: var(--text-main);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.12s, filter 0.2s, outline 0.15s, box-shadow 0.2s;
    text-align: left;
    background: var(--bg-card);
    position: relative;
    overflow: hidden;
  }
  /* left color strip */
  .opt-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 14px 0 0 14px;
  }
  .opt-btn.A::before { background: var(--opt-A); }
  .opt-btn.B::before { background: var(--opt-B); }
  .opt-btn.C::before { background: var(--opt-C); }
  .opt-btn.D::before { background: var(--opt-D); }

  .opt-btn:active { transform: scale(0.97); }
  .opt-btn:disabled { filter: brightness(0.35) blur(0.5px); cursor: not-allowed; }
  .opt-btn.selected {
    transform: scale(0.97);
    outline: 2px solid var(--gold);
    outline-offset: 2px;
    box-shadow: 0 0 16px var(--gold-glow);
  }
  .opt-btn:disabled:not(.selected) { filter: brightness(0.3) blur(1px); }

  .opt-icon {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 900; flex-shrink: 0; margin-left: 4px;
  }
  .opt-btn.A .opt-icon { color: var(--opt-A); }
  .opt-btn.B .opt-icon { color: var(--opt-B); }
  .opt-btn.C .opt-icon { color: var(--opt-C); }
  .opt-btn.D .opt-icon { color: var(--opt-D); }
  .opt-img { width: 100%; max-height: 60px; object-fit: contain; border-radius: 8px; }

  /* ── WAITING ── */
  #screen-waiting { gap: 24px; text-align: center; }
  .waiting-icon { font-size: 4rem; animation: spin 2s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .waiting-text { font-size: 1.1rem; color: var(--text-muted); font-weight: 600; }
  .points-earned { font-size: 2.5rem; font-weight: 900; }
  .points-earned.correct { color: var(--correct); }
  .points-earned.wrong   { color: #ff6b6b; }
  .total-score { font-size: 1rem; color: var(--text-muted); }

  /* ── RESULT ── */
  #screen-result { gap: 20px; text-align: center; }
  .result-icon { font-size: 5rem; }
  .result-label { font-size: 1.5rem; font-weight: 800; }
  .result-pts { font-size: 3rem; font-weight: 900; }
  .result-pts.correct { color: var(--correct); text-shadow: 0 0 20px rgba(74,222,128,0.4); }
  .result-pts.wrong   { color: #ff6b6b; }
  .result-total { font-size: 1rem; color: var(--text-muted); font-weight: 600; }

  /* Shake animation for wrong */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-10px); }
    40%     { transform: translateX(10px); }
    60%     { transform: translateX(-8px); }
    80%     { transform: translateX(8px); }
  }
  .shake { animation: shake 0.5s ease both; }

  /* ── LEADERBOARD ── */
  #screen-leaderboard { gap: 16px; }
  .lb-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 900;
    color: var(--gold-light); letter-spacing: 2px;
    text-shadow: 0 0 16px var(--gold-glow);
  }
  .lb-my-rank {
    font-size: 1rem;
    color: var(--text-muted);
    text-align: center;
    font-weight: 700;
    background: var(--bg-glass);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 18px;
  }
  .lb-rows { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .lb-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px; border-radius: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    animation: slideIn 0.35s ease both;
  }
  .lb-row:nth-child(1) { animation-delay: 0.05s; border-color: var(--gold); background: linear-gradient(90deg, rgba(201,169,110,0.2), rgba(240,208,128,0.1)); box-shadow: 0 0 16px var(--gold-glow); }
  .lb-row:nth-child(2) { animation-delay: 0.12s; border-color: rgba(200,200,220,0.25); }
  .lb-row:nth-child(3) { animation-delay: 0.19s; border-color: rgba(180,130,60,0.3); }
  .lb-row:nth-child(n+4) { animation-delay: 0.26s; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .lb-rank-num { font-size: 1.4rem; font-weight: 900; width: 36px; text-align: center; }
  .lb-name { flex: 1; font-size: 0.95rem; font-weight: 700; }
  .lb-score { font-size: 0.95rem; font-weight: 800; color: var(--gold-light); }
  .lb-row.rank-1 .lb-score { color: var(--gold-light); }

  /* ── FINISH ── */
  #screen-finish { gap: 20px; text-align: center; }
  .finish-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem; font-weight: 900;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 12px var(--gold-glow));
    line-height: 1.3;
  }

  .reconnect-msg { font-size: 0.85rem; color: #ff6b6b; margin-top: 10px; font-weight: 600; }
</style>
</head>
<body>

<!-- JOIN -->
<div id="screen-join" class="screen active">
  <div class="join-ring">💍</div>
  <div class="join-title">Kai &amp; Bella<br>婚禮問答</div>
  <div class="join-sub">輸入你的暱稱加入遊戲</div>
  <input type="text" id="nickname-input" class="input-field"
         placeholder="你的暱稱" maxlength="12" autocomplete="off">
  <button id="btn-join" class="btn-join" onclick="joinGame()">加入遊戲 🎮</button>
  <div id="join-error" class="error-msg"></div>
</div>

<!-- LOBBY -->
<div id="screen-lobby" class="screen">
  <div class="pulse-rings"><span></span><div class="pulse-core"></div></div>
  <div class="lobby-nickname" id="lobby-nickname">玩家名稱</div>
  <div class="lobby-wait">
    遊戲即將開始，請稍候
  </div>
  <div class="lobby-player-count" id="lobby-count">已加入 0 位玩家</div>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="q-header">
    <span id="q-progress">第 1 / 10 題</span>
    <div class="q-timer" id="q-timer">20</div>
  </div>
  <img id="q-img" class="q-image" style="display:none" src="" alt="">
  <div id="q-text" class="q-text">題目載入中...</div>
  <div class="options-list" id="options-list"></div>
</div>

<!-- WAITING (after submitting answer) -->
<div id="screen-waiting" class="screen">
  <div class="waiting-icon">⏳</div>
  <div class="waiting-text">已送出，等待公佈答案</div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div id="result-icon" class="result-icon">🎉</div>
  <div id="result-label" class="result-label">答對了！</div>
  <div id="result-pts" class="result-pts correct">+850 分</div>
  <div id="result-total" class="result-total">累積 850 分</div>
</div>

<!-- LEADERBOARD -->
<div id="screen-leaderboard" class="screen">
  <div class="lb-title">🏆 排行榜</div>
  <div class="lb-my-rank" id="lb-my-rank"></div>
  <div class="lb-rows" id="lb-rows"></div>
</div>

<!-- FINISH -->
<div id="screen-finish" class="screen">
  <div style="font-size:3rem">🥂</div>
  <div class="finish-title">遊戲結束！<br>恭喜 Kai &amp; Bella</div>
  <div class="lb-rows" id="final-lb-rows" style="width:100%"></div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/quiz/ws`;
let ws, myNickname = '', myScore = 0;
const LABELS = ['A','B','C','D'];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

// ── 音效 ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function ensureAudio() { if (!actx) actx = new AudioCtx(); }
function playTone(freq, dur, type='sine', vol=0.3) {
  ensureAudio();
  const osc = actx.createOscillator();
  const gain = actx.createGain();
  osc.connect(gain); gain.connect(actx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, actx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  osc.start(); osc.stop(actx.currentTime + dur);
}
function sfxTap()     { playTone(600, 0.05, 'sine', 0.2); }
function sfxCorrect() { [523,659,784].forEach((f,i) => setTimeout(()=>playTone(f,0.15,'sine',0.35),i*80)); }
function sfxWrong()   { playTone(160, 0.35, 'sawtooth', 0.3); }
function sfxTick()    { playTone(440, 0.06, 'square', 0.1); }

// ── 倒數 ──
let timerInterval = null;
function startTimer(limit, remaining) {
  clearInterval(timerInterval);
  let t = remaining !== undefined ? remaining : limit;
  const el = document.getElementById('q-timer');
  function update() {
    el.textContent = Math.ceil(t);
    el.style.color = t <= 5 ? '#ff5555' : t <= 10 ? '#ffd700' : '#50fa7b';
    if (t <= 5 && t > 0) sfxTick();
    if (t <= 0) clearInterval(timerInterval);
    t = Math.max(0, t - 1);
  }
  update();
  timerInterval = setInterval(update, 1000);
}

// ── 加入遊戲 ──
let wsReady = false;
let pendingJoin = null;

function joinGame() {
  const nickname = document.getElementById('nickname-input').value.trim();
  const errEl = document.getElementById('join-error');
  if (!nickname) { errEl.textContent = '請輸入暱稱'; return; }
  errEl.textContent = '';
  document.getElementById('btn-join').disabled = true;
  myNickname = nickname;
  if (wsReady) {
    ws.send(JSON.stringify({ type: 'player', nickname }));
  } else {
    pendingJoin = nickname;
    connectWS();
  }
}

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    wsReady = true;
    if (pendingJoin) {
      ws.send(JSON.stringify({ type: 'player', nickname: pendingJoin }));
      pendingJoin = null;
    }
  };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = () => {
    wsReady = false;
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => ws.close();
}

function sendAction(action, extra={}) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ action, ...extra }));
  }
}

// ── 訊息處理 ──
function handleMsg(data) {
  switch(data.type) {
    case 'error':
      document.getElementById('join-error').textContent = data.msg;
      document.getElementById('btn-join').disabled = false;
      break;

    case 'joined':
      myNickname = data.nickname;
      document.getElementById('lobby-nickname').textContent = `👋 ${data.nickname}`;
      showScreen('lobby');
      break;

    case 'player_count':
      document.getElementById('lobby-count').textContent = `已加入 ${data.count} 位玩家`;
      break;

    case 'question_start':
      clearInterval(timerInterval);
      showScreen('question');
      document.getElementById('q-progress').textContent = `第 ${data.index+1} / ${data.total} 題`;
      const imgEl = document.getElementById('q-img');
      if (data.image) { imgEl.src = data.image; imgEl.style.display = 'block'; }
      else { imgEl.style.display = 'none'; }
      document.getElementById('q-text').textContent = data.text;
      buildOptions(data.options, data.option_type || 'text');
      startTimer(data.time_limit, data.remaining);
      break;

    case 'answer_received':
      clearInterval(timerInterval);
      showScreen('waiting');
      break;

    case 'personal_result':
      clearInterval(timerInterval);
      const correct = data.correct;
      const pts = data.points_earned;
      myScore = data.total_score;
      document.getElementById('result-icon').textContent = correct ? '🎉' : '😅';
      document.getElementById('result-label').textContent = correct ? '答對了！' : (data.answered ? '答錯了...' : '沒有作答');
      const ptsEl = document.getElementById('result-pts');
      ptsEl.textContent = correct ? `+${pts} 分` : '+0 分';
      ptsEl.className = `result-pts ${correct ? 'correct' : 'wrong'}`;
      document.getElementById('result-total').textContent = `累積 ${myScore} 分`;
      if (correct) sfxCorrect(); else sfxWrong();
      showScreen('result');
      break;

    case 'leaderboard':
      buildLeaderboard(data.leaderboard, 'lb-rows', data.is_final);
      showScreen('leaderboard');
      break;

    case 'game_finish':
      buildLeaderboard(data.leaderboard, 'final-lb-rows', true);
      showScreen('finish');
      break;

    case 'game_reset':
      myScore = 0;
      document.getElementById('nickname-input').value = '';
      document.getElementById('btn-join').disabled = false;
      showScreen('join');
      break;
  }
}

// ── 建立選項按鈕 ──
function buildOptions(options, type) {
  const list = document.getElementById('options-list');
  list.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = `opt-btn ${LABELS[i]}`;
    btn.id = `opt-${i}`;
    const icon = document.createElement('div');
    icon.className = 'opt-icon';
    icon.textContent = LABELS[i];
    btn.appendChild(icon);
    if (type === 'image') {
      const img = document.createElement('img');
      img.src = opt; img.className = 'opt-img'; img.alt = LABELS[i];
      btn.appendChild(img);
    } else {
      const span = document.createElement('span');
      span.textContent = opt;
      btn.appendChild(span);
    }
    btn.onclick = () => submitAnswer(i);
    list.appendChild(btn);
  });
}

// ── 送出答案 ──
function submitAnswer(optIndex) {
  sfxTap();
  // 禁用所有按鈕
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  document.getElementById(`opt-${optIndex}`)?.classList.add('selected');
  sendAction('answer', { option: optIndex });
}

// ── 排行榜 ──
function buildLeaderboard(list, containerId, isFinal) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  const myRankEl = document.getElementById('lb-my-rank');
  let myRank = null;
  list.forEach((item, i) => {
    if (item.nickname === myNickname) myRank = item.rank;
    const row = document.createElement('div');
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
    row.className = `lb-row ${rankClass}`;
    const icons = ['🥇','🥈','🥉'];
    const rankNum = document.createElement('div');
    rankNum.className = 'lb-rank-num';
    rankNum.textContent = i < 3 ? icons[i] : item.rank;
    const name = document.createElement('div');
    name.className = 'lb-name';
    name.textContent = item.nickname + (item.nickname === myNickname ? ' 👈' : '');
    const score = document.createElement('div');
    score.className = 'lb-score';
    score.textContent = item.score.toLocaleString() + ' 分';
    row.appendChild(rankNum); row.appendChild(name); row.appendChild(score);
    el.appendChild(row);
  });
  if (myRankEl) {
    myRankEl.textContent = myRank ? `你目前排名第 ${myRank} 名` : '';
  }
}

document.getElementById('nickname-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});
document.addEventListener('touchstart', ensureAudio);
document.addEventListener('click', ensureAudio);

// 自動初始化 WebSocket（等用戶按加入才送 hello）
connectWS();
</script>
</body>
</html>
